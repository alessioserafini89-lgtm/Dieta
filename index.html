<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alessio Diet Pro v14</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a18; --surface: #222220; --card: #2a2a26; --border: #383832; --green: #7ab648; --green-dim: #1e2d12; --amber: #e8962a; --text: #f0ede6; --muted: #888878; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; padding-bottom: 80px; }
        header { background: linear-gradient(155deg, #1c2e10 0%, #0d1808 100%); padding: 20px 16px; border-bottom: 1px solid #304018; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .kcal-box { background: var(--green-dim); border: 1px solid #3a5020; border-radius: 10px; padding: 8px 12px; text-align: center; }
        .tab-wrap { background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 78px; z-index: 90; }
        .tabs { display: flex; padding: 0 10px; }
        .tab { flex-shrink: 0; padding: 12px 16px; color: var(--muted); cursor: pointer; }
        .tab.active { color: var(--green); border-bottom: 2px solid var(--green); font-weight: 600; }
        .meal-group { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; overflow: hidden; }
        .group-header { background: rgba(255,255,255,0.03); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .ingredient-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 12px; }
        .ingredient-row.done { opacity: 0.3; }
        .check-mini { width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .check-mini.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { border: 4px solid var(--surface); border-top: 4px solid var(--green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .settings-btn { position: fixed; bottom: 20px; left: 20px; background: var(--card); border: 1px solid var(--border); color: var(--muted); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 200; }
    </style>
</head>
<body>
<div id="loader"><div class="spinner"></div></div>
<header>
    <h1>Piano <em>Alessio</em></h1>
    <div class="kcal-box"><span id="remKcal" style="font-size: 1.4rem; color: var(--green); display: block;">2000</span><span style="font-size: 8px;">KCAL RIMASTE</span></div>
</header>
<div class="tab-wrap"><div class="tabs" id="tabs"></div></div>
<div class="main" id="app"></div>

<button class="settings-btn" onclick="saveKey()">⚙️</button>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwx0IJtoE9MaSIAmf1GVUT2fPY0iyOrnyc5Q9AeuCNL4D9atCGOMNkM7N1AI6LhrehgWw/exec";
let allData = [];
let selectedDate = new Date().toLocaleDateString('it-IT');

function saveKey() {
    const k = prompt("Inserisci Chiave Claude (sk-ant...):", localStorage.getItem('claude_key') || "");
    if(k) { localStorage.setItem('claude_key', k); alert("Chiave salvata nel telefono!"); }
}

async function loadData() {
    try {
        const response = await fetch(SCRIPT_URL);
        allData = await response.json();
        renderTabs(); renderApp();
        document.getElementById('loader').style.display = 'none';
    } catch (e) { document.getElementById('loader').innerHTML = "Errore dati"; }
}

function renderTabs() {
    const tabs = document.getElementById('tabs'); tabs.innerHTML = "";
    const uniqueDates = [...new Set(allData.map(item => item.Data))].sort((a,b) => a.split('/').reverse().join('').localeCompare(b.split('/').reverse().join('')));
    uniqueDates.forEach(dateStr => {
        const tab = document.createElement('div');
        tab.className = `tab ${dateStr === selectedDate ? 'active' : ''}`;
        tab.innerText = dateStr.split('/')[0] + " " + new Date(dateStr.split('/')[2], dateStr.split('/')[1]-1, dateStr.split('/')[0]).toLocaleDateString('it-IT', {weekday:'short'});
        tab.onclick = () => { selectedDate = dateStr; renderTabs(); renderApp(); };
        tabs.appendChild(tab);
    });
}

function renderApp() {
    const container = document.getElementById('app'); container.innerHTML = "";
    const dietaGiorno = allData.filter(r => r.Data === selectedDate);
    const groups = dietaGiorno.reduce((acc, item) => {
        if (!acc[item['Tipologia Pasto']]) acc[item['Tipologia Pasto']] = [];
        acc[item['Tipologia Pasto']].push(item); return acc;
    }, {});

    let kcalConsumate = 0;
    for (const [mealName, items] of Object.entries(groups)) {
        const groupEl = document.createElement('div');
        groupEl.className = 'meal-group';
        let groupHtml = `<div class="group-header"><span style="color:var(--amber)">${mealName}</span> <button onclick="askAI('${mealName}')" style="background:none; border:1px solid var(--border); color:var(--green); font-size:10px; padding:3px 8px; border-radius:4px;">AI</button></div>`;
        items.forEach(item => {
            const isDone = item.Fatto === "TRUE" || item.Fatto === true;
            if(isDone) kcalConsumate += (parseInt(item.Calorie) || 0);
            groupHtml += `<div class="ingredient-row ${isDone ? 'done' : ''}">
                <div class="check-mini ${isDone ? 'active' : ''}" onclick="toggleIngredient('${item.ID}', ${isDone})">✓</div>
                <div style="flex:1; font-size:14px">${item.Alimento}</div>
                <div style="font-size:12px; color:var(--muted)">${item.Calorie} kcal</div>
            </div>`;
        });
        groupEl.innerHTML = groupHtml; container.appendChild(groupEl);
    }
    document.getElementById('remKcal').textContent = 2000 - kcalConsumate;
}

async function askAI(mealName) {
    const key = localStorage.getItem('claude_key');
    if(!key) return alert("Clicca ⚙️ e inserisci la chiave!");
    const prompt = `Propone 4 alternative per ${mealName} low carb. Solo JSON: [{"alimento":"nome","calorie":100}]`;
    
    // USIAMO GOOGLE COME PROXY SICURO
    const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'proxyClaude', prompt: prompt, key: key })
    });
    const resText = await response.text();
    alert("Risposta IA: " + resText); // Qui poi gestiremo il popup con le scelte
}

async function toggleIngredient(id, currentStatus) {
    const newStatus = !currentStatus;
    allData.find(i => i.ID == id).Fatto = newStatus ? "TRUE" : "FALSE";
    renderApp();
    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'toggleDone', id: id, value: newStatus ? "TRUE" : "FALSE" }) });
}

window.onload = loadData;
</script>
</body>
</html>
