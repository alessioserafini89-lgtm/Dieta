<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alessio Diet Premium + Voice & Categories</title>
    <style>
        /* TEMA PREMIUM MODERNO */
        :root { --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --muted: #8e8e93; --green: #34c759; --amber: #ff9f0a; --border: #e5e5ea; --shadow: rgba(0,0,0,0.05); }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; --card: #1c1c1e; --text: #ffffff; --border: #2c2c2e; --shadow: rgba(0,0,0,0.3); } }
        
        * { box-sizing: border-box; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        .header { padding: 25px 20px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .header h2 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .kcal-box { text-align: right; background: var(--card); padding: 8px 15px; border-radius: 12px; box-shadow: 0 4px 10px var(--shadow); }
        .kcal-num { color: var(--green); font-size: 22px; font-weight: 800; }
        .kcal-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; }

        .tabs { display: flex; overflow-x: auto; gap: 10px; padding: 5px 20px 15px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 10px 20px; background: var(--card); border-radius: 25px; font-size: 14px; font-weight: 600; white-space: nowrap; color: var(--muted); border: 1px solid var(--border); cursor: pointer; box-shadow: 0 2px 5px var(--shadow); transition: 0.2s; }
        .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

        .meal-group { padding: 0 20px; margin-bottom: 25px; }
        .meal-title { font-size: 18px; font-weight: 700; color: var(--amber); margin-bottom: 12px; margin-left: 5px; }
        
        .card { background: var(--card); border-radius: 20px; box-shadow: 0 4px 15px var(--shadow); border: 1px solid var(--border); overflow: hidden; }
        .row { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .row:last-child { border-bottom: none; }
        .row.sub { padding-left: 20px; background: rgba(142, 142, 147, 0.03); }
        .row.done { opacity: 0.6; }

        .check { width: 28px; height: 28px; border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.2s; color: transparent; }
        .check.active { background: var(--green); border-color: var(--green); color: #fff; }

        .info { flex: 1; }
        .name { font-size: 16px; font-weight: 500; display: flex; align-items: center; }
        .name.father { font-weight: 700; font-size: 17px; }
        .row.sub .name::before { content: '•'; color: var(--amber); font-weight: bold; font-size: 20px; margin-right: 8px; }

        .macros { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 500; }
        
        .weight-input { width: 60px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px; text-align: center; font-weight: 700; font-size: 14px; }
        .kcal-val { width: 45px; text-align: right; font-weight: 800; font-size: 16px; color: var(--text); }

        .btn-sub { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 12px; font-size: 11px; font-weight: 700; margin-top: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }

        /* Popup & Categorie */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .popup { background: var(--card); border-radius: 24px; width: 100%; max-width: 400px; max-height: 85vh; padding: 25px; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .cat-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .cat-btn:active { transform: scale(0.96); }

        .custom-input { display: flex; gap: 8px; margin-bottom: 20px; }
        .mic-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; width: 45px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .mic-btn.recording { background: #ff3b30; color: white; border-color: #ff3b30; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .custom-input input { flex: 1; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; }
        .custom-input button.create-btn { padding: 0 15px; border-radius: 12px; background: var(--text); color: var(--bg); border: none; font-weight: bold; cursor: pointer;}
        
        .opt-card { background: var(--bg); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .opt-card:active { transform: scale(0.98); }

        .robot { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--text); border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 28px; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2); cursor: pointer; z-index: 100; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Dieta</h2>
        <div class="kcal-box"><div class="kcal-num" id="remKcal">2000</div><div class="kcal-label">Kcal Rimaste</div></div>
    </div>
    <div class="tabs" id="tabList"></div>
    <div id="app"></div>
    
    <div id="overlay" class="overlay"><div class="popup" id="popupContent"></div></div>
    <button class="robot" onclick="setKey()">🔑</button>

<script>
// --- METTI IL TUO URL QUI ---
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxxEzXCd4a8_5uzvhGGvyrWVlsBb0W7rHVOZQOYzSMoKEQU2t4o0DEVPTX3TsQMvWsZ5Q/exec";
let allData = [], selectedDate = "", activeId = null, currentFood = "", currentKcal = 0, aiOptions = [], selectedRecipe = null;

function setKey() { const k = prompt("Incolla Chiave Gemini:"); if(k) localStorage.setItem('gem_key', k); }

async function load() {
    try {
        const r = await fetch(SCRIPT_URL);
        allData = await r.json();
        const dates = [...new Set(allData.map(x => x.Data))];
        if(!selectedDate) selectedDate = dates[0];
        render();
    } catch(e) { document.getElementById('app').innerHTML = "<div style='padding:20px; text-align:center;'>Errore caricamento.</div>"; }
}

function render() {
    document.getElementById('tabList').innerHTML = [...new Set(allData.map(x => x.Data))].map(d => `<div class="tab ${d===selectedDate?'active':''}" onclick="selectedDate='${d}';render()">${d}</div>`).join('');
    const cont = document.getElementById('app'); cont.innerHTML = "";
    const dayData = allData.filter(x => x.Data === selectedDate);
    const groups = dayData.reduce((acc, x) => { const p = x.Pasto || "Pasto"; if(!acc[p]) acc[p] = []; acc[p].push(x); return acc; }, {});

    let consumate = 0;

    dayData.forEach(item => {
        const isSub = String(item.ID).includes('.');
        const done = String(item.Fatto).toUpperCase() === "TRUE";
        const kcal = Math.round(Number(item.Calorie) || 0);

        if (done) {
            if (isSub) {
                const fatherId = String(item.ID).split('.')[0];
                const father = dayData.find(x => String(x.ID) === fatherId);
                const fatherDone = father ? String(father.Fatto).toUpperCase() === "TRUE" : false;
                if (!fatherDone) consumate += kcal;
            } else {
                consumate += kcal;
            }
        }
    });

    for(const [pasto, items] of Object.entries(groups)) {
        const groupDiv = document.createElement('div'); groupDiv.className = "meal-group";
        groupDiv.innerHTML = `<div class="meal-title">${pasto}</div>`;
        const card = document.createElement('div'); card.className = "card";
        
        items.forEach((item) => {
            const isSub = String(item.ID).includes('.');
            const done = String(item.Fatto).toUpperCase() === "TRUE";
            const kcal = Math.round(Number(item.Calorie) || 0);
            const cleanName = item.Alimento.replace(/^->\s*/, '');

            card.innerHTML += `
                <div class="row ${isSub ? 'sub' : ''} ${done ? 'done' : ''}">
                    <div class="check ${done?'active':''}" onclick="toggle('${item.ID}',${done})">✓</div>
                    <div class="info">
                        <div class="name ${!isSub?'father':''}">${cleanName}</div>
                        <div class="macros">PROT ${item.Prot}g • CARB ${item.Carb}g • GRAS ${item.Grassi}g</div>
                        ${!isSub ? `<button class="btn-sub" onclick="openMenu('${item.ID}','${cleanName.replace(/'/g, "\\'")}',${kcal})">✨ Modifica Piatto</button>` : ''}
                    </div>
                    ${isSub ? `<input type="number" class="weight-input" value="${item['Peso gr']}" onchange="updWeight('${item.ID}',this.value,${item['Peso gr']},${item.Calorie})">` : ''}
                    <div class="kcal-val">${kcal>0?kcal:''}</div>
                </div>`;
        });
        groupDiv.appendChild(card);
        cont.appendChild(groupDiv);
    }
    document.getElementById('remKcal').innerText = 2000 - consumate;
}

// NUOVO STEP 1: Apre il Menu senza chiamare l'IA
function openMenu(id, food, kcal) {
    const key = localStorage.getItem('gem_key'); if(!key) return alert("Inserisci chiave Gemini (pulsante in basso).");
    activeId = id; currentFood = food; currentKcal = kcal;
    const popup = document.getElementById('popupContent');
    document.getElementById('overlay').style.display='flex';
    
    popup.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="font-size:20px;">Sostituisci</h3>
            <button onclick="document.getElementById('overlay').style.display='none'" style="background:none; border:none; font-size:24px; color:var(--muted); cursor:pointer;">&times;</button>
        </div>
        
        <p style="font-size:13px; color:var(--muted); margin-bottom:10px;">Scegli una categoria per generare alternative:</p>
        
        <div class="category-grid">
            <button class="cat-btn" onclick="generateCategory('Pesce')">🐟 Pesce</button>
            <button class="cat-btn" onclick="generateCategory('Carne')">🥩 Carne</button>
            <button class="cat-btn" onclick="generateCategory('Formaggi')">🧀 Formaggi</button>
            <button class="cat-btn" onclick="generateCategory('Uova')">🍳 Uova</button>
            <button class="cat-btn" onclick="generateCategory('Vegano/Vegetariano')" style="grid-column: span 2; justify-content:center;">🥗 Vegetariano / Vegano</button>
        </div>

        <p style="font-size:13px; color:var(--muted); margin-bottom:10px; margin-top:20px;">Oppure dettalo a voce / scrivilo:</p>
        <div class="custom-input">
            <button id="micBtn" class="mic-btn" onclick="startDictation()">🎤</button>
            <input type="text" id="customIdea" placeholder="Es. Tonno e fagioli">
            <button class="create-btn" onclick="generateCustom()">Crea</button>
        </div>
        
        <div id="aiList" style="margin-top:15px;"></div>
    `;
}

// STEP 2: Generazione guidata tramite categoria
async function generateCategory(category) {
    const key = localStorage.getItem('gem_key');
    document.getElementById('aiList').innerHTML = `<div style="text-align:center; padding:15px; font-size:14px; font-weight:500;">Cerco alternative a base di ${category}... ⏳</div>`;
    
    const prompt = `Sei un nutrizionista. Crea 4 piatti keto o sani a base di ${category} per sostituire "${currentFood}" (totale: circa ${currentKcal} kcal per piatto, completi di eventuali contorni). Rispondi SOLO con un array JSON senza formattazione (no markdown): [{"alimento": "Nome", "calorie": 400, "prot": 30, "carb": 5, "grassi": 25, "ingredienti": [{"nome": "Ingrediente1", "peso": 150, "calorie": 300, "prot": 20, "carb": 2, "grassi": 20}]}]`;
    
    fetchAI(key, prompt, true);
}

// STEP 2 B: Generazione libera (Testo / Voce)
async function generateCustom() {
    const customText = document.getElementById('customIdea').value;
    if(!customText) return;
    const key = localStorage.getItem('gem_key');
    document.getElementById('aiList').innerHTML = `<div style="text-align:center; padding:15px; font-size:14px; font-weight:500;">Calcolo grammi e macro per <b>${customText}</b>... ⏳</div>`;
    
    const prompt = `Voglio mangiare "${customText}". Crea la ricetta bilanciata per un totale esatto di circa ${currentKcal} kcal. Rispondi SOLO JSON (no array, no markdown): {"alimento": "${customText}", "calorie": 400, "prot": 30, "carb": 5, "grassi": 25, "ingredienti": [{"nome": "Ingrediente", "peso": 100, "calorie": 200, "prot": 15, "carb": 2, "grassi": 10}]}`;

    fetchAI(key, prompt, false);
}

// Funzione unificata per chiamare Gemini
async function fetchAI(key, prompt, isArray) {
    try {
        const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'proxyAI', key, prompt }) });
        const d = await r.json();
        const text = d.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim();
        
        if (isArray) {
            aiOptions = JSON.parse(text);
            document.getElementById('aiList').innerHTML = aiOptions.map((o, idx) => `
                <div class="opt-card" onclick="reviewRecipe(${idx})">
                    <b style="font-size:16px;">${o.alimento}</b><br>
                    <div style="color:var(--green); font-weight:700; margin-top:5px; font-size:13px;">${o.calorie} kcal <span style="color:var(--muted); font-weight:500;">| P:${o.prot}g C:${o.carb}g G:${o.grassi}g</span></div>
                </div>
            `).join('');
        } else {
            aiOptions = [JSON.parse(text)]; 
            reviewRecipe(0); 
        }
    } catch(e) { document.getElementById('aiList').innerHTML = "<span style='color:red'>Errore IA. Riprova con termini diversi.</span>"; }
}

// LOGICA MICROFONO
function startDictation() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert("Il tuo browser non supporta la dettatura vocale. Usa Safari o Chrome."); return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'it-IT'; recognition.interimResults = false; recognition.maxAlternatives = 1;
    const micBtn = document.getElementById('micBtn');
    micBtn.classList.add('recording');
    recognition.start();

    recognition.onresult = function(event) {
        document.getElementById('customIdea').value = event.results[0][0].transcript;
        micBtn.classList.remove('recording');
    };
    recognition.onspeechend = function() { recognition.stop(); micBtn.classList.remove('recording'); };
    recognition.onerror = function(event) { console.error("Errore mic:", event.error); micBtn.classList.remove('recording'); };
}

// STEP 3: REVISIONE RICETTA
function reviewRecipe(idx) {
    selectedRecipe = aiOptions[idx];
    const popup = document.getElementById('popupContent');
    let ingHtml = selectedRecipe.ingredienti.map(i => `<div style="font-size:13px; padding:6px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;"><span>• ${i.nome} (${i.peso}g)</span><span style="font-weight:bold">${i.calorie} kcal</span></div>`).join('');

    popup.innerHTML = `
        <h3 style="color:var(--text); margin-bottom:5px; font-size:22px;">${selectedRecipe.alimento}</h3>
        <div style="color:var(--green); font-weight:800; font-size:18px; margin-bottom:20px;">${selectedRecipe.calorie} kcal <span style="color:var(--muted); font-size:12px; font-weight:600;">(P:${selectedRecipe.prot} C:${selectedRecipe.carb} G:${selectedRecipe.grassi})</span></div>
        
        <div style="background:var(--bg); padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid var(--border);">
            <div style="font-size:10px; color:var(--muted); font-weight:700; margin-bottom:10px;">NUOVI INGREDIENTI (Sostituiranno i vecchi)</div>
            ${ingHtml}
        </div>
        
        <div style="display:flex; gap:10px;">
            <button onclick="openMenu(activeId, currentFood, currentKcal)" style="flex:1; padding:15px; border-radius:12px; background:var(--bg); color:var(--text); border:1px solid var(--border); cursor:pointer; font-weight:bold;">Indietro</button>
            <button onclick="applyRecipe()" style="flex:1; padding:15px; border-radius:12px; background:var(--text); color:var(--bg); font-weight:bold; border:none; cursor:pointer;">Conferma Ricetta</button>
        </div>
    `;
}

function applyRecipe() {
    document.getElementById('popupContent').innerHTML = "<div style='text-align:center; padding:30px; font-weight:bold;'>Salvataggio su Excel in corso... ⏳</div>";
    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'replaceRecipe', id: activeId, recipe: selectedRecipe }) })
    .then(() => { document.getElementById('overlay').style.display = 'none'; load(); });
}

function toggle(id, c) {
    const ns = !c ? "TRUE" : "FALSE";
    allData.find(i => i.ID == id).Fatto = ns; render();
    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'toggleDone', id, value: ns }) });
}

function updWeight(id, nw, ow, ok) {
    const nk = Math.round((ok/ow)*nw);
    const item = allData.find(i => i.ID == id);
    item['Peso gr'] = nw; item.Calorie = nk; render();
    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateWeight', id, newWeight: nw, newKcal: nk }) });
}

window.onload = load;
</script>
</body>
</html>
