<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Piano Alessio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a18; --surface: #222220; --card: #2a2a26; --border: #383832;
            --green: #7ab648; --green-dim: #1e2d12; --amber: #e8962a; --amber-dim: #332310;
            --text: #f0ede6; --muted: #888878; --done-bg: #141f0c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; padding-bottom: 50px; }
        header { background: linear-gradient(155deg, #1c2e10 0%, #0d1808 100%); padding: 20px 16px; border-bottom: 1px solid #304018; position: sticky; top: 0; z-index: 100; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
        h1 em { color: var(--green); font-style: italic; }
        
        .main { padding: 15px; max-width: 600px; margin: 0 auto; }
        .meal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; transition: all 0.3s; }
        .meal-card.done { background: var(--done-bg); border-color: var(--green-dim); opacity: 0.8; }
        
        .meal-header { display: flex; align-items: center; padding: 12px; gap: 12px; border-bottom: 1px solid var(--border); }
        .meal-name { flex: 1; font-weight: 600; font-size: 14px; }
        .meal-kcal { color: var(--amber); font-weight: 700; font-size: 13px; }
        
        .check-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: none; color: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .check-btn.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }

        .food-detail { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .food-text { font-size: 13px; color: var(--text); flex: 1; padding-right: 10px; }
        
        .sub-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; white-space: nowrap; }
        .sub-btn:active { background: var(--amber-dim); color: var(--amber); }

        .loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { border: 4px solid var(--surface); border-top: 4px solid var(--green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .no-data { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-size:12px; color:var(--muted)">Sincronizzazione Dieta...</p>
</div>

<header>
    <div class="eyebrow" style="font-size:10px; color:var(--green); letter-spacing:2px; margin-bottom:5px">PIANO DINAMICO</div>
    <h1>Ciao <em>Alessio</em> 👋</h1>
    <div id="stats" style="font-size:12px; color:var(--muted); margin-top:5px">Caricamento dati...</div>
</header>

<div class="main" id="app"></div>

<script>
// --- CONFIGURAZIONE ---
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyl2iI7HHxtU3dQ43ttyGl6_4dyjSI3yqZNjCnYBTYAha3Z4RPYgjs8dp9X8yy9X8gg8g/exec";
const CLAUDE_API_KEY = localStorage.getItem('ale_api_key') || "";

let dietaOggi = [];

// 1. CARICA DATI DAL FOGLIO GOOGLE
async function loadData() {
    try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        
        // Prendiamo la data odierna in formato locale (es. 07/04/2026) per confrontarla con la colonna 'Data'
        const oggi = new Date().toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
        
        // Filtriamo i dati controllando la proprietà 'Data' del JSON
        dietaOggi = data.filter(r => {
            // Se la data nel foglio è un oggetto Date o una stringa, normalizziamo il confronto
            const dataRow = r.Data.includes('T') ? new Date(r.Data).toLocaleDateString('it-IT') : r.Data;
            return dataRow === oggi;
        });
        
        renderApp();
        document.getElementById('loader').style.display = 'none';
    } catch (e) {
        console.error(e);
        document.getElementById('loader').innerHTML = `<p style="color:red; padding:20px">Errore: ${e.message}</p>`;
    }
}

// 2. DISEGNA L'INTERFACCIA
function renderApp() {
    const container = document.getElementById('app');
    container.innerHTML = "";
    
    if (dietaOggi.length === 0) {
        container.innerHTML = `<div class="no-data">Nessun pasto programmato per oggi (${new Date().toLocaleDateString('it-IT')}).<br>Controlla il foglio Google!</div>`;
        document.getElementById('stats').textContent = "Riposo";
        return;
    }

    let kcalTot = 0;
    let kcalFatte = 0;

    dietaOggi.forEach(item => {
        const calorie = parseInt(item.Calorie) || 0;
        const isDone = item.Fatto === "TRUE" || item.Fatto === true;
        
        kcalTot += calorie;
        if (isDone) kcalFatte += calorie;

        const card = document.createElement('div');
        card.className = `meal-card ${isDone ? 'done' : ''}`;
        card.innerHTML = `
            <div class="meal-header">
                <button class="check-btn ${isDone ? 'active' : ''}" 
                        onclick="toggleDone('${item.ID}', ${isDone})">✓</button>
                <div class="meal-name">${item['Tipologia Pasto'] || 'Pasto'}</div>
                <div class="meal-kcal">${calorie} kcal</div>
            </div>
            <div class="food-detail">
                <div class="food-text">${item.Alimento || 'Nessun alimento'}</div>
                <button class="sub-btn" onclick="askSubstitution('${item.ID}', '${item.Alimento}', ${calorie})">↺ Sostituisci</button>
            </div>
        `;
        container.appendChild(card);
    });

    const rimanenti = kcalTot - kcalFatte;
    document.getElementById('stats').textContent = `🔥 ${rimanenti} kcal rimanenti su ${kcalTot}`;
}

// 3. SEGNA COME FATTO (Invia al foglio)
async function toggleDone(id, currentStatus) {
    const newStatus = !currentStatus;
    // Aggiornamento ottimistico dell'interfaccia
    await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ 
            action: 'toggleDone', 
            id: id.toString(), 
            value: newStatus.toString().toUpperCase() 
        })
    });
    // Ricarichiamo i dati per allineare tutto
    loadData();
}

// 4. SOSTITUZIONE CON IA (Claude)
async function askSubstitution(id, food, kcal) {
    if (!CLAUDE_API_KEY) { 
        alert("Inserisci la chiave API nella tab AI o nel codice."); 
        return; 
    }
    
    const originalEvent = event;
    const btn = originalEvent.target;
    const originalText = btn.textContent;
    btn.textContent = "⏳...";
    btn.disabled = true;
    
    try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': CLAUDE_API_KEY,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
                model: "claude-3-haiku-20240307",
                max_tokens: 150,
                messages: [{role: "user", content: `Sostituisci "${food}" (circa ${kcal} kcal) con un'alternativa proteica low-carb (pollo, pesce, uova, ricotta, affettati magri, verdure). Rispondi SOLO ed ESCLUSIVAMENTE con un oggetto JSON: {"alimento": "nome alimento e peso", "calorie": numero_intero}`}]
            })
        });

        const data = await response.json();
        const cleanText = data.content[0].text;
        const result = JSON.parse(cleanText);

        // Invio al foglio
        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ 
                action: 'replace', 
                id: id.toString(), 
                newFood: result.alimento, 
                newCalories: result.calorie 
            })
        });

        btn.textContent = "✅";
        setTimeout(() => loadData(), 500);
    } catch (e) {
        console.error(e);
        alert("Errore IA: " + e.message);
        btn.textContent = originalText;
        btn.disabled = false;
    }
}

// Avvio
window.onload = loadData;
</script>

</body>
</html>
