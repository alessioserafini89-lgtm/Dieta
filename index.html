<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Piano Alessio Pro v4</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a18; --surface: #222220; --card: #2a2a26; --border: #383832;
            --green: #7ab648; --green-dim: #1e2d12; --amber: #e8962a; --amber-dim: #332310;
            --text: #f0ede6; --muted: #888878; --done-bg: #141f0c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; padding-bottom: 80px; }
        
        header { background: linear-gradient(155deg, #1c2e10 0%, #0d1808 100%); padding: 20px 16px; border-bottom: 1px solid #304018; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
        h1 em { color: var(--green); font-style: italic; }
        
        .kcal-box { background: var(--green-dim); border: 1px solid #3a5020; border-radius: 10px; padding: 8px 12px; text-align: center; min-width: 90px; }
        .kcal-num { display: block; font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--green); line-height: 1; }
        .kcal-lbl { font-size: 9px; text-transform: uppercase; color: var(--muted); }

        /* CALENDARIO */
        .tab-wrap { background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; position: sticky; top: 88px; z-index: 90; }
        .tabs { display: flex; padding: 0 10px; }
        .tab { flex-shrink: 0; padding: 12px 16px; text-align: center; color: var(--muted); border-bottom: 2px solid transparent; cursor: pointer; }
        .tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }
        .tab.is-today { background: rgba(122, 182, 72, 0.15); border-radius: 8px 8px 0 0; }
        .tab .dn { display: block; font-size: 1.1rem; font-family: 'Playfair Display'; }

        .main { padding: 15px; max-width: 600px; margin: 0 auto; }
        .meal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .meal-card.done { background: var(--done-bg); border-color: var(--green-dim); opacity: 0.8; }
        
        .meal-header { display: flex; align-items: center; padding: 12px; gap: 12px; border-bottom: 1px solid var(--border); }
        .meal-name { flex: 1; font-weight: 600; font-size: 14px; }
        .meal-kcal { color: var(--amber); font-weight: 700; font-size: 13px; }
        
        .check-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: none; color: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .check-btn.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }

        .food-detail { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .food-text { font-size: 13px; color: var(--text); flex: 1; padding-right: 10px; }
        
        .sub-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }

        /* POPUP SOSTITUZIONE */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 400; display: none; flex-direction: column; justify-content: flex-end; }
        .popup { background: var(--surface); border-top: 2px solid var(--green); border-radius: 20px 20px 0 0; padding: 20px; max-height: 90vh; overflow-y: auto; }
        .option-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .option-card:active { border-color: var(--green); background: var(--green-dim); }
        .option-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .option-kcal { color: var(--amber); font-size: 12px; font-weight: 700; }
        
        .search-area { border-top: 1px solid var(--border); margin-top: 15px; padding-top: 15px; }
        .search-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; margin-bottom: 10px; }

        /* FAB E CHAT */
        .ai-fab { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #000; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 200; cursor: pointer; border: none; }
        
        .loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { border: 4px solid var(--surface); border-top: 4px solid var(--green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader" class="loader"><div class="spinner"></div></div>

<header>
    <div class="header-top">
        <div>
            <div class="eyebrow" style="font-size:9px; color:var(--green); letter-spacing:2px;">PIANO ALESSIO</div>
            <h1>Ciao <em>Alessio</em> 👋</h1>
        </div>
        <div class="kcal-box">
            <span class="kcal-num" id="remKcal">2000</span>
            <span class="kcal-lbl">kcal rimaste</span>
        </div>
    </div>
</header>

<div class="tab-wrap"><div class="tabs" id="tabs"></div></div>
<div class="main" id="app"></div>

<div id="subOverlay" class="overlay" onclick="closePopup(event)">
    <div class="popup" onclick="event.stopPropagation()">
        <h3 style="margin-bottom:15px; font-family:'Playfair Display'">Sostituisci Pasto</h3>
        <div id="optionsContainer">
            <p style="color:var(--muted); font-size:12px;">Chiedo alle IA le alternative migliori...</p>
        </div>
        <div class="search-area">
            <p style="font-size:11px; color:var(--muted); margin-bottom:8px;">O CERCA ALTRO:</p>
            <input type="text" id="customSearch" class="search-input" placeholder="es. voglia di pizza proteica o uova...">
            <button onclick="searchCustom()" style="width:100%; padding:12px; background:var(--green); border:none; border-radius:10px; font-weight:700;">Cerca Alternativa</button>
        </div>
        <button onclick="closePopup()" style="width:100%; margin-top:15px; background:none; border:none; color:var(--muted); font-size:12px;">Annulla</button>
    </div>
</div>

<button class="ai-fab" onclick="alert('Chatbot in arrivo o integra la funzione precedente')">🤖</button>

<script>
const SCRIPT_URL = "INCOLLA_IL_TUO_URL_APPS_SCRIPT";
const CLAUDE_KEY = localStorage.getItem('ale_api_key') || "";
let allData = [];
let selectedDate = new Date().toLocaleDateString('it-IT');
let currentSubId = null;

async function loadData() {
    try {
        const response = await fetch(SCRIPT_URL);
        allData = await response.json();
        renderTabs();
        renderApp();
        document.getElementById('loader').style.display = 'none';
    } catch (e) { console.error(e); }
}

function renderTabs() {
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = "";
    const uniqueDates = [...new Set(allData.map(item => item.Data))].sort((a,b) => a.split('/').reverse().join('').localeCompare(b.split('/').reverse().join('')));
    uniqueDates.forEach(dateStr => {
        const parts = dateStr.split('/');
        const tab = document.createElement('div');
        tab.className = `tab ${dateStr === selectedDate ? 'active' : ''}`;
        tab.innerHTML = `<span class="dn">${parts[0]}</span><span class="dl">${new Date(parts[2], parts[1]-1, parts[0]).toLocaleDateString('it-IT', { weekday: 'short' })}</span>`;
        tab.onclick = () => { selectedDate = dateStr; renderTabs(); renderApp(); };
        tabs.appendChild(tab);
    });
}

function renderApp() {
    const container = document.getElementById('app');
    container.innerHTML = "";
    const dietaGiorno = allData.filter(r => r.Data === selectedDate);
    let kcalConsumate = 0;
    dietaGiorno.forEach(item => {
        const kcal = parseInt(item.Calorie) || 0;
        const isDone = item.Fatto === "TRUE" || item.Fatto === true;
        if (isDone) kcalConsumate += kcal;
        const card = document.createElement('div');
        card.className = `meal-card ${isDone ? 'done' : ''}`;
        card.innerHTML = `
            <div class="meal-header">
                <button class="check-btn ${isDone ? 'active' : ''}" onclick="toggleDone('${item.ID}', ${isDone})">✓</button>
                <div class="meal-name">${item['Tipologia Pasto']}</div>
                <div class="meal-kcal">${kcal} kcal</div>
            </div>
            <div class="food-detail">
                <div class="food-text">${item.Alimento}</div>
                <button class="sub-btn" onclick="openSubPopup('${item.ID}', '${item.Alimento}', ${kcal})">↺ Sostituisci</button>
            </div>`;
        container.appendChild(card);
    });
    document.getElementById('remKcal').textContent = 2000 - kcalConsumate;
}

async function toggleDone(id, currentStatus) {
    const newStatus = !currentStatus;
    allData.find(i => i.ID == id).Fatto = newStatus ? "TRUE" : "FALSE";
    renderApp();
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'toggleDone', id: id, value: newStatus.toString().toUpperCase() }) });
}

// LOGICA SOSTITUZIONE
async function openSubPopup(id, food, kcal) {
    currentSubId = id;
    document.getElementById('subOverlay').style.display = 'flex';
    document.getElementById('optionsContainer').innerHTML = '<p style="color:var(--muted); font-size:12px;">Generando 4 proposte...</p>';
    
    try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': CLAUDE_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
            body: JSON.stringify({
                model: "claude-3-haiku-20240307",
                max_tokens: 400,
                messages: [{role: "user", content: `L'utente mangia "${food}" (${kcal} kcal). Proponi 4 alternative diverse ma con calorie simili. Rispondi SOLO con un array JSON: [{"alimento": "nome", "calorie": numero}]`}]
            })
        });
        const data = await response.json();
        const options = JSON.parse(data.content[0].text.match(/\[.*\]/s)[0]);
        displayOptions(options);
    } catch (e) { console.error(e); }
}

function displayOptions(options) {
    const container = document.getElementById('optionsContainer');
    container.innerHTML = "";
    options.forEach(opt => {
        const div = document.createElement('div');
        div.className = 'option-card';
        div.innerHTML = `<div class="option-title">${opt.alimento}</div><div class="option-kcal">${opt.calorie} kcal</div>`;
        div.onclick = () => selectSubstitution(opt.alimento, opt.calorie);
        container.appendChild(div);
    });
}

async function searchCustom() {
    const query = document.getElementById('customSearch').value;
    if(!query) return;
    const container = document.getElementById('optionsContainer');
    container.innerHTML = '<p style="color:var(--muted); font-size:12px;">Cerco soluzione personalizzata...</p>';
    
    try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': CLAUDE_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
            body: JSON.stringify({
                model: "claude-3-haiku-20240307",
                max_tokens: 200,
                messages: [{role: "user", content: `L'utente vuole: "${query}". Calcola le calorie e formatta come JSON: {"alimento": "nome e peso", "calorie": numero}`}]
            })
        });
        const data = await response.json();
        const res = JSON.parse(data.content[0].text.match(/\{.*\}/s)[0]);
        displayOptions([res]);
    } catch (e) { console.error(e); }
}

async function selectSubstitution(newFood, newKcal) {
    const id = currentSubId;
    const item = allData.find(i => i.ID == id);
    item.Alimento = newFood;
    item.Calorie = newKcal;
    renderApp();
    closePopup();
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'replace', id: id, newFood: newFood, newCalories: newKcal }) });
}

function closePopup() { document.getElementById('subOverlay').style.display = 'none'; }
window.onload = loadData;
</script>
</body>
</html>
