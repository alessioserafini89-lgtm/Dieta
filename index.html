<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dieta AI</title>
  <style>
    :root{
      --bg:#1a1a18;
      --surface:#222220;
      --card:#2a2a26;
      --border:#383832;
      --green:#7ab648;
      --text:#f0ede6;
      --muted:#9a998f;
      --red:#e05a3a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,sans-serif;
      padding:16px;
    }
    .wrap{
      max-width:700px;
      margin:0 auto;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:16px;
      margin-bottom:14px;
    }
    h1{
      margin:0 0 8px;
      font-size:24px;
    }
    p{
      color:var(--muted);
      line-height:1.5;
    }
    input, textarea, button{
      width:100%;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--text);
      padding:12px;
      font-size:14px;
    }
    textarea{
      min-height:120px;
      resize:vertical;
    }
    button{
      background:var(--green);
      color:#10200b;
      border:none;
      font-weight:700;
      cursor:pointer;
    }
    .row{
      display:flex;
      gap:10px;
      margin-top:10px;
    }
    .row > *{
      flex:1;
    }
    .msg{
      white-space:pre-wrap;
      line-height:1.6;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      min-height:120px;
    }
    .error{
      color:#ffb3a3;
    }
    .small{
      font-size:12px;
      color:var(--muted);
      margin-top:8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Dieta AI</h1>
      <p>Assistente semplice per il piano alimentare con supporto Anthropic.</p>
    </div>

    <div class="card">
      <label for="apiKey">Chiave API Anthropic</label>
      <input id="apiKey" type="password" placeholder="sk-ant-..." />
      <div class="row">
        <button onclick="saveApiKey()">Salva chiave</button>
        <button onclick="clearApiKey()">Cancella</button>
      </div>
      <div class="small" id="apiStatus">Nessuna chiave salvata.</div>
    </div>

    <div class="card">
      <label for="prompt">Messaggio</label>
      <textarea id="prompt" placeholder="Esempio: Cosa mangio stasera restando alto in proteine e low-carb?"></textarea>
      <div class="row">
        <button id="sendBtn" onclick="sendPrompt()">Invia</button>
      </div>
    </div>

    <div class="card">
      <label>Risposta</label>
      <div id="output" class="msg">Pronto.</div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "anthropic_api_key_v1";
    const pendingCallbacks = {};
    let callbackCounter = 0;

    function $(id) {
      return document.getElementById(id);
    }

    function setOutput(text, isError = false) {
      const el = $("output");
      el.textContent = text;
      el.className = isError ? "msg error" : "msg";
    }

    function updateApiStatus() {
      const key = localStorage.getItem(STORAGE_KEY);
      $("apiStatus").textContent = key
        ? "Chiave salvata sul dispositivo."
        : "Nessuna chiave salvata.";
      $("apiKey").value = key || "";
    }

    function saveApiKey() {
      const key = $("apiKey").value.trim();
      if (!key) {
        setOutput("Inserisci una chiave API valida.", true);
        return;
      }
      localStorage.setItem(STORAGE_KEY, key);
      updateApiStatus();
      setOutput("Chiave API salvata.");
    }

    function clearApiKey() {
      localStorage.removeItem(STORAGE_KEY);
      updateApiStatus();
      setOutput("Chiave API cancellata.");
    }

    function getApiKey() {
      return localStorage.getItem(STORAGE_KEY) || "";
    }

    window.androidCallback = function(callbackId, rawJson) {
      const callback = pendingCallbacks[callbackId];
      if (!callback) return;
      delete pendingCallbacks[callbackId];
      callback(rawJson);
    };

    async function callAnthropic(apiKey, bodyObj) {
      if (window.AndroidBridge && typeof window.AndroidBridge.callAnthropic === "function") {
        return new Promise((resolve, reject) => {
          const callbackId = "cb_" + (++callbackCounter);

          pendingCallbacks[callbackId] = function(rawJson) {
            try {
              const data = JSON.parse(rawJson);
              if (data.error) {
                reject(new Error(data.error.message || "Errore API"));
                return;
              }
              resolve(data);
            } catch (e) {
              reject(new Error("Risposta bridge non valida: " + e.message));
            }
          };

          try {
            window.AndroidBridge.callAnthropic(
              apiKey,
              JSON.stringify(bodyObj),
              callbackId
            );
          } catch (e) {
            delete pendingCallbacks[callbackId];
            reject(e);
          }
        });
      }

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify(bodyObj)
      });

      const data = await response.json();

      if (!response.ok || data.error) {
        throw new Error(data?.error?.message || ("HTTP " + response.status));
      }

      return data;
    }

    function extractText(data) {
      if (!data || !Array.isArray(data.content) || !data.content.length) {
        throw new Error("Risposta vuota");
      }
      const textBlock = data.content.find(x => x.type === "text") || data.content[0];
      if (!textBlock || !textBlock.text) {
        throw new Error("Testo non presente nella risposta");
      }
      return textBlock.text;
    }

    async function sendPrompt() {
      const apiKey = getApiKey().trim();
      const prompt = $("prompt").value.trim();

      if (!apiKey) {
        setOutput("Salva prima la chiave API.", true);
        return;
      }

      if (!prompt) {
        setOutput("Scrivi un messaggio prima di inviare.", true);
        return;
      }

      const btn = $("sendBtn");
      btn.disabled = true;
      setOutput("Attendo risposta...");

      try {
        const body = {
          model: "claude-sonnet-4-5",
          max_tokens: 500,
          messages: [
            {
              role: "user",
              content: prompt
            }
          ]
        };

        const data = await callAnthropic(apiKey, body);
        const text = extractText(data);
        setOutput(text);
      } catch (e) {
        setOutput("Errore: " + e.message, true);
      } finally {
        btn.disabled = false;
      }
    }

    updateApiStatus();
  </script>
</body>
</html>
