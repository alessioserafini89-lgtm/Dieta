<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alessio Diet - Chef Edition</title>
    <style>
        :root { --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --muted: #8e8e93; --green: #34c759; --amber: #ff9f0a; --red: #ff3b30; --border: #e5e5ea; --shadow: rgba(0,0,0,0.05); }
        @media (prefers-color-scheme: dark) { :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #2c2c2e; --shadow: rgba(0,0,0,0.3); } }
        * { box-sizing: border-box; margin: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }
        .header { padding: 25px 20px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header h2 { font-size: 28px; font-weight: 800; margin: 0; }
        .kcal-box { text-align: right; background: var(--card); padding: 8px 15px; border-radius: 12px; box-shadow: 0 4px 10px var(--shadow); border: 1px solid var(--border); }
        .kcal-num { color: var(--green); font-size: 22px; font-weight: 800; }
        .tabs { display: flex; overflow-x: auto; gap: 10px; padding: 5px 20px 15px; scrollbar-width: none; }
        .tab { padding: 10px 20px; background: var(--card); border-radius: 25px; font-size: 14px; font-weight: 600; white-space: nowrap; color: var(--muted); border: 1px solid var(--border); cursor: pointer; }
        .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
        .meal-group { padding: 0 20px; margin-bottom: 25px; }
        .meal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .meal-title { font-size: 18px; font-weight: 700; color: var(--amber); }
        .add-btn { background: var(--green); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        .card { background: var(--card); border-radius: 20px; box-shadow: 0 4px 15px var(--shadow); border: 1px solid var(--border); overflow: hidden; }
        .row { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .row.sub { padding-left: 20px; background: rgba(142, 142, 147, 0.03); }
        .row.sub .name::before { content: '•'; color: var(--amber); margin-right: 8px; font-weight: bold; }
        .row.done { opacity: 0.5; }
        .check { width: 28px; height: 28px; border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: transparent; }
        .check.active { background: var(--green); border-color: var(--green); color: #fff; }
        .info { flex: 1; min-width:0; }
        .name { font-size: 16px; font-weight: 500; }
        .macros { font-size: 11px; color: var(--muted); margin-top: 4px; }
        .btn-sub { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 12px; font-size: 11px; font-weight: 700; margin-top: 8px; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .popup { background: var(--card); border-radius: 24px; width: 100%; max-width: 400px; max-height: 85vh; padding: 25px; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .cat-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer; }
        .custom-input { display: flex; gap: 6px; margin-bottom: 20px; }
        .custom-input input { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        .create-btn { padding: 0 14px; border-radius: 12px; background: var(--text); color: var(--bg); border: none; font-weight: bold; cursor: pointer; }
        .opt-card { background: var(--bg); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left"><h2>Dieta</h2><button class="key-btn" onclick="setKey()">🔑</button></div>
        <div class="kcal-box"><div class="kcal-num" id="remKcal">2000</div></div>
    </div>
    <div class="tabs" id="tabList"></div>
    <div id="app"></div>
    <div id="overlay" class="overlay"><div class="popup" id="popupContent"></div></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxxEzXCd4a8_5uzvhGGvyrWVlsBb0W7rHVOZQOYzSMoKEQU2t4o0DEVPTX3TsQMvWsZ5Q/exec";
let allData = [], selectedDate = "", activeId = null, currentFood = "", currentKcal = 0, remKcalVal = 0, activePasto = "";
let step1Main = "", step2Side = "";

function setKey() { const k = prompt("Incolla Chiave Gemini:"); if(k) localStorage.setItem('gem_key', k); }

async function load() {
    try {
        const r = await fetch(SCRIPT_URL);
        allData = await r.json();
        const dates = [...new Set(allData.map(x => x.Data))];
        if(!selectedDate) selectedDate = dates[0];
        render();
    } catch(e) { console.error(e); }
}

function render() {
    document.getElementById('tabList').innerHTML = [...new Set(allData.map(x => x.Data))].map(d => `<div class="tab ${d===selectedDate?'active':''}" onclick="selectedDate='${d}';render()">${d}</div>`).join('');
    const cont = document.getElementById('app'); cont.innerHTML = "";
    const dayData = allData.filter(x => x.Data === selectedDate);
    const groups = dayData.reduce((acc, x) => { const p = x.Pasto || "Altro"; if(!acc[p]) acc[p] = []; acc[p].push(x); return acc; }, {});

    let consumate = 0;
    dayData.forEach(item => {
        const isSub = String(item.ID).includes('.');
        const done = String(item.Fatto).toUpperCase() === "TRUE";
        if (done) {
            if (isSub) {
                const fatherId = String(item.ID).split('.')[0];
                const father = dayData.find(x => String(x.ID) === fatherId);
                if (!father || String(father.Fatto).toUpperCase() !== "TRUE") consumate += Math.round(Number(item.Calorie)||0);
            } else { consumate += Math.round(Number(item.Calorie)||0); }
        }
    });
    remKcalVal = 2000 - consumate;
    document.getElementById('remKcal').innerText = remKcalVal;

    for(const [pasto, items] of Object.entries(groups)) {
        const groupDiv = document.createElement('div'); groupDiv.className = "meal-group";
        groupDiv.innerHTML = `<div class="meal-header"><div class="meal-title">${pasto}</div><button class="add-btn" onclick="openAdd('${pasto}')">+</button></div>`;
        const card = document.createElement('div'); card.className = "card";
        items.forEach(item => {
            const isSub = String(item.ID).includes('.');
            const done = String(item.Fatto).toUpperCase() === "TRUE";
            const cleanName = item.Alimento.replace(/^->\s*/, '');
            card.innerHTML += `<div class="row ${isSub?'sub':''}">
                <div class="check ${done?'active':''}" onclick="toggle('${item.ID}',${done},${!isSub})">✓</div>
                <div class="info">
                    <div class="name ${!isSub?'father':''}">${cleanName}</div>
                    <div class="macros">P:${item.Prot} C:${item.Carb} G:${item.Grassi}</div>
                    ${!isSub ? `<button class="btn-sub" onclick="openStep1('${item.ID}','${cleanName}',${item.Calorie})">✨ Suggerisci</button>` : ''}
                </div>
                <div class="kcal-val">${item.Calorie}</div>
                <button style="border:none;background:none;opacity:0.3" onclick="deleteItem('${item.ID}')">🗑️</button>
            </div>`;
        });
        groupDiv.appendChild(card); cont.appendChild(groupDiv);
    }
}

// STEP 1: Scelta Piatto Principale
function openStep1(id, food, kcal) {
    activeId = id; currentFood = food; currentKcal = kcal;
    document.getElementById('overlay').style.display = 'flex';
    const popup = document.getElementById('popupContent');
    popup.innerHTML = `
        <h3>Passo 1/2</h3>
        <p style="margin-bottom:15px">Cosa ti va come piatto principale?</p>
        <div class="cat-grid">
            <button class="cat-btn" onclick="selectMain('Pesce')">🐟 Pesce</button>
            <button class="cat-btn" onclick="selectMain('Carne')">🥩 Carne</button>
            <button class="cat-btn" onclick="selectMain('Uova')">🍳 Uova</button>
            <button class="cat-btn" onclick="selectMain('Formaggi')">🧀 Formaggi</button>
        </div>
        <div class="custom-input">
            <input type="text" id="customMain" placeholder="Es: Petto di pollo">
            <button class="create-btn" onclick="selectMain(document.getElementById('customMain').value)">Ok</button>
        </div>
    `;
}

function selectMain(val) {
    step1Main = val;
    openStep2();
}

// STEP 2: Scelta Contorno
function openStep2() {
    const popup = document.getElementById('popupContent');
    popup.innerHTML = `
        <h3>Passo 2/2</h3>
        <p style="margin-bottom:15px">E come contorno?</p>
        <div class="cat-grid">
            <button class="cat-btn" onclick="generateFinal('Verdure grigliate')">🥗 Verdure</button>
            <button class="cat-btn" onclick="generateFinal('Insalata mista')">🥬 Insalata</button>
            <button class="cat-btn" onclick="generateFinal('Patate al forno')">🥔 Patate</button>
            <button class="cat-btn" onclick="generateFinal('Nessun contorno')">❌ Nessuno</button>
        </div>
        <div class="custom-input">
            <input type="text" id="customSide" placeholder="Es: Broccoli">
            <button class="create-btn" onclick="generateFinal(document.getElementById('customSide').value)">Vai</button>
        </div>
    `;
}

async function generateFinal(side) {
    step2Side = side;
    const key = localStorage.getItem('gem_key');
    const popup = document.getElementById('popupContent');
    popup.innerHTML = "<p style='text-align:center'>Lo Chef sta creando 4 varianti... ⏳</p>";
    
    const prompt = `Crea 4 piatti keto/sani composti da "${step1Main}" e "${step2Side}" (totale circa ${currentKcal} kcal). Rispondi SOLO array JSON: [{"alimento": "Nome", "calorie": 400, "prot": 30, "carb": 5, "grassi": 25, "ingredienti": [{"nome": "X", "peso": 100, "calorie": 200, "prot": 15, "carb": 2, "grassi": 10}]}]`;
    
    try {
        const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'proxyAI', key, prompt }) });
        const d = await r.json();
        const opts = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, ""));
        popup.innerHTML = `<h3>Scegli la tua preferita</h3>` + opts.map((o, idx) => `
            <div class="opt-card" onclick="applyRecipe(${JSON.stringify(o).replace(/"/g, '&quot;')})">
                <b>${o.alimento}</b><br><small>${o.calorie} kcal | P:${o.prot} C:${o.carb} G:${o.grassi}</small>
            </div>
        `).join('');
    } catch(e) { popup.innerHTML = "Errore IA. Riprova."; }
}

async function applyRecipe(recipe) {
    const popup = document.getElementById('popupContent');
    popup.innerHTML = "<p style='text-align:center'>Salvataggio e preparazione ricetta... ⏳</p>";
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'replaceRecipe', id: activeId, recipe }) });
    
    // MOSTRA LA RICETTA FINALE DOPO IL SALVATAGGIO
    let ingStr = recipe.ingredienti.map(i => `<div style="display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding:5px 0"><span>• ${i.nome}</span> <b>${i.peso}g</b></div>`).join('');
    popup.innerHTML = `
        <h2 style="color:var(--green)">Buon appetito! 🎉</h2>
        <div style="background:var(--bg);padding:15px;border-radius:15px;margin:15px 0">
            <h3 style="margin-bottom:10px">${recipe.alimento}</h3>
            ${ingStr}
        </div>
        <p style="font-size:12px;color:var(--muted);text-align:center">Dati salvati correttamente su Google Sheets.</p>
        <button onclick="document.getElementById('overlay').style.display='none';load()" style="width:100%;padding:15px;margin-top:15px;border-radius:12px;border:none;background:var(--text);color:var(--bg);font-weight:bold">Chiudi</button>
    `;
}

function toggle(id, curr, isFather) {
    const ns = !curr ? "TRUE" : "FALSE";
    const action = isFather ? "bulkToggle" : "toggleDone";
    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action, id, parentId: id, value: ns }) });
    setTimeout(load, 400);
}

function deleteItem(id) { if(confirm("Eliminare?")) { fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteRow', id }) }); setTimeout(load, 500); } }
function openAdd(pasto) { /* Funzione add esistente... */ }
window.onload = load;
</script>
</body>
</html>
