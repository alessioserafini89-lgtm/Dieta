<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alessio Diet - Gemini 2.5</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --green: #32d74b; --amber: #ff9f0a; --text: #fff; --muted: #8e8e93; }
        * { box-sizing: border-box; margin: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .tabs { display: flex; overflow-x: auto; gap: 10px; padding: 0 20px 15px; }
        .tab { padding: 8px 16px; background: var(--card); border-radius: 20px; font-size: 14px; white-space: nowrap; border: 1px solid #333; }
        .tab.active { background: var(--green); color: #000; font-weight: bold; border: none; }
        .meal-card { background: var(--card); margin: 15px; border-radius: 16px; border: 1px solid #2c2c2e; overflow: hidden; }
        .row { padding: 15px; border-bottom: 1px solid #2c2c2e; }
        .row.sub { padding-left: 35px; background: rgba(255,255,255,0.03); }
        .row-top { display: flex; align-items: center; gap: 12px; }
        .check { width: 24px; height: 24px; border: 2px solid #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .check.active { background: var(--green); border-color: var(--green); color: #000; }
        .info { flex: 1; }
        .name { font-size: 15px; }
        .name.father { color: var(--amber); font-size: 17px; font-weight: bold; }
        .weight-input { width: 55px; background: #000; color: var(--amber); border: 1px solid #444; border-radius: 6px; padding: 4px; text-align: center; font-weight: bold; }
        .sub-btn { background: #333; color: var(--text); border: none; padding: 4px 10px; border-radius: 6px; font-size: 10px; margin-top: 8px; }
        .robot { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .popup { background: var(--card); border: 1px solid var(--green); border-radius: 20px; width: 100%; max-height: 80vh; padding: 20px; overflow-y: auto; }
        .opt { background: #000; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Dieta Alessio</h2>
        <div style="text-align: right;"><span id="remKcal" style="color: var(--green); font-size: 24px; font-weight: bold;">2000</span><div style="font-size: 10px; color: var(--muted);">KCAL RIMASTE</div></div>
    </div>
    <div class="tabs" id="tabList"></div>
    <div id="app"></div>
    <div id="overlay" class="overlay" onclick="this.style.display='none'"><div class="popup" onclick="event.stopPropagation()"><h3 id="popTitle" style="margin-bottom:15px">Gemini 2.5 sta pensando...</h3><div id="options"></div></div></div>
    <button class="robot" onclick="setKey()">🤖</button>

<script>
// ---------- METTI IL TUO URL QUI ----------
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxxEzXCd4a8_5uzvhGGvyrWVlsBb0W7rHVOZQOYzSMoKEQU2t4o0DEVPTX3TsQMvWsZ5Q/exec";

let allData = [], selectedDate = "", activeId = null;

function setKey() { const k = prompt("Inserisci la tua Chiave Gemini:"); if(k) localStorage.setItem('gem_key', k); }

async function load() {
    try {
        const r = await fetch(SCRIPT_URL);
        allData = await r.json();
        const dates = [...new Set(allData.map(x => x.Data))];
        if(!selectedDate) selectedDate = dates[0];
        render();
    } catch (e) {
        document.getElementById('app').innerHTML = "<div style='padding:20px; text-align:center;'>Errore caricamento dati dal foglio. Controlla l'URL.</div>";
    }
}

function render() {
    const dates = [...new Set(allData.map(x => x.Data))];
    document.getElementById('tabList').innerHTML = dates.map(d => `<div class="tab ${d===selectedDate?'active':''}" onclick="selectedDate='${d}';render()">${d}</div>`).join('');
    const cont = document.getElementById('app'); cont.innerHTML = "";
    const dayData = allData.filter(x => x.Data === selectedDate);
    const groups = dayData.reduce((acc, x) => { const p = x.Pasto || "Pasto"; if(!acc[p]) acc[p] = []; acc[p].push(x); return acc; }, {});

    let consumate = 0;
    for(const [pasto, items] of Object.entries(groups)) {
        const card = document.createElement('div'); card.className = "meal-card";
        let rows = items.map((item, idx) => {
            const isSub = String(item.ID).includes('.');
            const done = String(item.Fatto).toUpperCase() === "TRUE";
            const kcal = Math.round(Number(item.Calorie) || 0);
            
            // Calcolo calorie esatto
            const hasSubs = !isSub && items[idx+1] && String(items[idx+1].ID).includes('.');
            if(done && !hasSubs) consumate += kcal;

            return `<div class="row ${isSub?'sub':''}">
                <div class="row-top">
                    <div class="check ${done?'active':''}" onclick="toggle('${item.ID}',${done})">${done?'✓':''}</div>
                    <div class="info">
                        <div class="name ${!isSub?'father':''}">${item.Alimento}</div>
                        <div style="font-size:10px; color:var(--muted)">P:${item.Prot}g C:${item.Carb}g G:${item.Grassi}g</div>
                        <button class="sub-btn" onclick="openAI('${item.ID}','${item.Alimento}',${kcal})">Sostituisci</button>
                    </div>
                    ${isSub?`<input type="number" class="weight-input" value="${item['Peso gr']}" onchange="updWeight('${item.ID}',this.value,${item['Peso gr']},${item.Calorie})">`:''}
                    <div style="width:45px; text-align:right; font-weight:bold;">${kcal>0?kcal:''}</div>
                </div>
            </div>`;
        }).join('');
        card.innerHTML = `<div style="padding:15px; font-weight:bold; color:var(--amber); border-bottom:1px solid #2c2c2e">${pasto}</div>${rows}`;
        cont.appendChild(card);
    }
    document.getElementById('remKcal').innerText = 2000 - consumate;
}

async function openAI(id, food, kcal) {
    const key = localStorage.getItem('gem_key'); if(!key) return alert("Clicca sul robot in basso a destra per inserire la chiave!");
    activeId = id; document.getElementById('overlay').style.display='flex';
    document.getElementById('options').innerHTML = "Caricamento alternative...";
    
    // Chiediamo ESPLICITAMENTE di non formattare con i backtick ```json
    const prompt = `Sei un nutrizionista. Sostituisci "${food}" (${kcal} kcal) con 4 alternative keto. Restituisci SOLO un array JSON pulito senza markup o markdown. Formato esatto: [{"alimento": "nome", "calorie": numero}]`;

    try {
        const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'proxyAI', key, prompt }) });
        const data = await r.json();
        
        let text = data.candidates[0].content.parts[0].text;
        text = text.replace(/```json/g, "").replace(/```/g, "").trim(); // Pulizia di sicurezza
        
        const opts = JSON.parse(text);
        document.getElementById('options').innerHTML = opts.map(o => `<div class="opt" onclick="applySub('${o.alimento.replace(/'/g, "\\'")}',${o.calorie})"><b>${o.alimento}</b><br><small style="color:var(--green)">${o.calorie} kcal</small></div>`).join('');
    } catch(e) { document.getElementById('options').innerHTML = "Errore durante la generazione. Chiudi e riprova."; console.log(e); }
}

function applySub(f, k) {
    const item = allData.find(i => i.ID == activeId);
    item.Alimento = f; item.Calorie = k; render();
    document.getElementById('overlay').style.display = 'none';
    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'replace', id: activeId, newFood: f, newKcal: k }) });
}

function toggle(id, c) {
    const ns = !c ? "TRUE" : "FALSE";
    allData.find(i => i.ID == id).Fatto = ns; render();
    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'toggleDone', id, value: ns }) });
}

function updWeight(id, nw, ow, ok) {
    const nk = Math.round((ok/ow)*nw);
    const item = allData.find(i => i.ID == id);
    item['Peso gr'] = nw; item.Calorie = nk; render();
    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateWeight', id, newWeight: nw, newKcal: nk }) });
}

window.onload = load;
</script>
</body>
</html>
