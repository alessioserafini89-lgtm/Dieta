<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alessio Diet v15 - Smart Grams</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a18; --surface: #222220; --card: #2a2a26; --border: #383832; --green: #7ab648; --green-dim: #1e2d12; --amber: #e8962a; --text: #f0ede6; --muted: #888878; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; padding-bottom: 80px; }
        header { background: linear-gradient(155deg, #1c2e10 0%, #0d1808 100%); padding: 15px 20px; border-bottom: 1px solid #304018; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .kcal-box { background: var(--green-dim); border: 1px solid #3a5020; border-radius: 10px; padding: 8px 12px; text-align: center; }
        .tab-wrap { background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 72px; z-index: 90; white-space: nowrap; }
        .tabs { display: flex; padding: 0 10px; }
        .tab { display: inline-block; padding: 15px 20px; color: var(--muted); cursor: pointer; font-size: 14px; }
        .tab.active { color: var(--green); border-bottom: 2px solid var(--green); font-weight: 600; }
        .main { padding: 15px; max-width: 600px; margin: 0 auto; }
        .meal-group { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; overflow: hidden; }
        .group-header { background: rgba(255,255,255,0.03); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .ingredient-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 10px; }
        .ingredient-row.done { opacity: 0.3; }
        .check-mini { width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .check-mini.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }
        .weight-input { background: #1a1a18; border: 1px solid var(--border); color: var(--amber); width: 55px; padding: 2px 5px; border-radius: 4px; text-align: center; font-size: 13px; font-weight: bold; }
        .ai-fab { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #000; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: none; z-index: 200; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { border: 4px solid var(--surface); border-top: 4px solid var(--green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="loader"><div class="spinner"></div></div>
<header>
    <h1 style="font-family:'Playfair Display'">Piano <em>Alessio</em></h1>
    <div class="kcal-box"><span id="remKcal" style="font-size: 1.4rem; color: var(--green); display: block; font-family:'Playfair Display'">2000</span><span style="font-size: 8px;">KCAL RIMASTE</span></div>
</header>
<div class="tab-wrap"><div class="tabs" id="tabs"></div></div>
<div class="main" id="app"></div>

<button class="ai-fab" onclick="alert('Usa il tasto AI nei pasti')">🤖</button>

<script>
// INCOLLA IL TUO URL /exec QUI
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7oSNlhiI_tY3q0efLtHb_obmzOAdRCrEJ1p_Pg1DD_1RejiCMAedE2pVPOq6fe46HEg/exec";
let allData = [];
let selectedDate = "";

async function loadData() {
    try {
        const response = await fetch(SCRIPT_URL);
        allData = await response.json();
        
        const uniqueDates = [...new Set(allData.map(item => item.Data))];
        selectedDate = selectedDate || uniqueDates[0];

        renderTabs(uniqueDates);
        renderApp();
        document.getElementById('loader').style.display = 'none';
    } catch (e) { document.getElementById('loader').innerHTML = "Errore connessione Foglio Google"; }
}

function renderTabs(dates) {
    const container = document.getElementById('tabs'); container.innerHTML = "";
    dates.forEach(d => {
        const tab = document.createElement('div');
        tab.className = `tab ${d === selectedDate ? 'active' : ''}`;
        tab.innerText = d; 
        tab.onclick = () => { selectedDate = d; renderTabs(dates); renderApp(); };
        container.appendChild(tab);
    });
}

function renderApp() {
    const container = document.getElementById('app'); container.innerHTML = "";
    const dietaGiorno = allData.filter(r => r.Data === selectedDate);
    const groups = dietaGiorno.reduce((acc, item) => {
        if (!acc[item['Tipologia Pasto']]) acc[item['Tipologia Pasto']] = [];
        acc[item['Tipologia Pasto']].push(item); return acc;
    }, {});

    let kcalConsumate = 0;
    for (const [mealName, items] of Object.entries(groups)) {
        const groupEl = document.createElement('div');
        groupEl.className = 'meal-group';
        let groupHtml = `<div class="group-header"><span style="color:var(--amber); font-family:'Playfair Display'">${mealName}</span></div>`;
        
        items.forEach(item => {
            const isDone = item.Fatto === "TRUE" || item.Fatto === true;
            const kcal = Math.round(parseFloat(item.Calorie) || 0);
            if(isDone) kcalConsumate += kcal;
            
            groupHtml += `<div class="ingredient-row ${isDone ? 'done' : ''}">
                <div class="check-mini ${isDone ? 'active' : ''}" onclick="toggleIngredient('${item.ID}', ${isDone})">✓</div>
                <div style="flex:1; font-size:14px">${item.Alimento}</div>
                <input type="number" class="weight-input" value="${item['Peso gr']}" onchange="updateWeight('${item.ID}', this.value, ${item['Peso gr']}, ${item.Calorie})">
                <div style="font-size:11px; color:var(--muted); min-width:45px; text-align:right">${kcal} kcal</div>
            </div>`;
        });
        groupEl.innerHTML = groupHtml; container.appendChild(groupEl);
    }
    document.getElementById('remKcal').textContent = 2000 - kcalConsumate;
}

async function updateWeight(id, newWeight, oldWeight, oldKcal) {
    const newKcal = Math.round((oldKcal / oldWeight) * newWeight);
    const item = allData.find(i => i.ID == id);
    item['Peso gr'] = newWeight;
    item.Calorie = newKcal;
    renderApp();
    
    // Aggiorna Google Sheet
    await fetch(SCRIPT_URL, { 
        method: 'POST', 
        mode: 'no-cors', 
        body: JSON.stringify({ action: 'updateWeight', id: id, newWeight: newWeight, newKcal: newKcal }) 
    });
}

async function toggleIngredient(id, currentStatus) {
    const newStatus = !currentStatus;
    allData.find(i => i.ID == id).Fatto = newStatus ? "TRUE" : "FALSE";
    renderApp();
    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'toggleDone', id: id, value: newStatus ? "TRUE" : "FALSE" }) });
}

window.onload = loadData;
</script>
</body>
</html>
