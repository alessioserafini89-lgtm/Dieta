<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST IA 100%</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 30px; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; }
        button { background: #32d74b; color: #000; font-weight: bold; cursor: pointer; }
        #log { background: #111; border: 1px solid #333; padding: 15px; text-align: left; font-family: monospace; font-size: 12px; overflow-x: auto; color: #0f0; }
    </style>
</head>
<body>

    <h2>Test Connessione IA</h2>
    
    <input type="text" id="apiKey" placeholder="Incolla chiave Gemini (AI Studio)">
    <button onclick="testAI()">TESTA IA ORA</button>

    <div id="status" style="margin: 20px; font-weight: bold;">Stato: In attesa</div>
    <div id="log">I dettagli tecnici appariranno qui...</div>

    <script>
    // --- METTI IL TUO URL QUI ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7cFdHruJ57qWlnKSe_pz7NunRlfbx8aPQ_Okk6aH5Ak2g1Ra0XUDMsJyaoaqNcIzvTQ/exec";

    async function testAI() {
        const key = document.getElementById('apiKey').value;
        const status = document.getElementById('status');
        const log = document.getElementById('log');

        if(!key) return alert("Inserisci la chiave Gemini!");

        status.innerText = "Chiamata a Google Script...";
        status.style.color = "orange";
        log.innerText = "Avvio richiesta fetch...";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'proxyAI',
                    key: key,
                    prompt: 'Rispondi solo con "FUNZIONA"'
                })
            });

            log.innerText += "\nRisposta ricevuta dal server...";
            const data = await response.json();
            log.innerText += "\nJSON analizzato: " + JSON.stringify(data);

            if (data.candidates && data.candidates[0].content) {
                const aiResponse = data.candidates[0].content.parts[0].text;
                status.innerText = "SUCCESSO! L'IA HA RISPOSTO: " + aiResponse;
                status.style.color = "#32d74b";
            } else {
                status.innerText = "ERRORE NELLA RISPOSTA IA";
                status.style.color = "red";
            }

        } catch (e) {
            status.innerText = "ERRORE CRITICO / CORS";
            status.style.color = "red";
            log.innerText += "\nERRORE: " + e.toString();
        }
    }
    </script>
</body>
</html>
