<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alessio Diet - Keto Pro Edition</title>
    <style>
        :root { --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --muted: #8e8e93; --green: #34c759; --amber: #ff9f0a; --red: #ff3b30; --blue: #0a84ff; --border: #e5e5ea; --shadow: rgba(0,0,0,0.05); }
        @media (prefers-color-scheme: dark) { :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #2c2c2e; --shadow: rgba(0,0,0,0.3); } }
        * { box-sizing: border-box; margin: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }
        .header { padding: 25px 20px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header h2 { font-size: 28px; font-weight: 800; margin: 0; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        
        .btn-circle { background: var(--card); border: 1px solid var(--border); border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; color: var(--text); cursor: pointer; transition: 0.2s; box-shadow: 0 2px 8px var(--shadow); }
        
        .kcal-box { text-align: right; background: var(--card); padding: 8px 15px; border-radius: 12px; box-shadow: 0 4px 10px var(--shadow); border: 1px solid var(--border); }
        .kcal-num { color: var(--green); font-size: 22px; font-weight: 800; }
        .kcal-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
        
        .tabs { display: flex; overflow-x: auto; gap: 10px; padding: 5px 20px 15px; scrollbar-width: none; }
        .tab { padding: 10px 20px; background: var(--card); border-radius: 25px; font-size: 14px; font-weight: 600; white-space: nowrap; color: var(--muted); border: 1px solid var(--border); cursor: pointer; }
        .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
        
        .meal-group { padding: 0 20px; margin-bottom: 25px; }
        .meal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .meal-title { font-size: 18px; font-weight: 700; color: var(--amber); }
        
        .header-btns { display: flex; gap: 8px; }
        .add-btn { background: var(--green); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; font-size:18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .info-btn { background: var(--text); color: var(--bg); border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .sugg-btn { background: var(--amber); color: #fff; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .card { background: var(--card); border-radius: 20px; box-shadow: 0 4px 15px var(--shadow); border: 1px solid var(--border); overflow: hidden; }
        .row { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .row.sub { padding-left: 20px; background: rgba(142, 142, 147, 0.03); }
        .row.sub .name::before { content: '•'; color: var(--amber); margin-right: 8px; font-weight: bold; }
        .row.done { opacity: 0.5; }
        .check { width: 28px; height: 28px; border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: transparent; }
        .check.active { background: var(--green); border-color: var(--green); color: #fff; }
        
        .info { flex: 1; min-width:0; }
        .name { font-size: 16px; font-weight: 500; }
        .name span { color: var(--muted); font-size: 14px; font-weight: normal; }
        .macros { font-size: 11px; color: var(--muted); margin-top: 4px; }
        .kcal-val { width: 45px; text-align: right; font-weight: 800; font-size: 16px; color: var(--text); }
        
        .actions { display: flex; gap: 8px; align-items: center; }
        .action-icon { background: none; border: none; font-size: 18px; cursor: pointer; opacity: 0.5; transition: 0.2s; padding: 4px; }
        .action-icon:hover { opacity: 1; transform: scale(1.1); }
        .del-icon { color: var(--red); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .popup { background: var(--card); border-radius: 24px; width: 100%; max-width: 400px; max-height: 85vh; padding: 25px; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .cat-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer; }
        .custom-input { display: flex; gap: 6px; margin-bottom: 20px; }
        .custom-input input { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        .create-btn { padding: 0 14px; border-radius: 12px; background: var(--text); color: var(--bg); border: none; font-weight: bold; cursor: pointer; }
        .opt-card { background: var(--bg); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); cursor: pointer; }

        .macro-bar { display: flex; height: 12px; border-radius: 6px; overflow: hidden; margin: 15px 0; background: #333;}
        .m-prot { background: var(--blue); transition: width 0.5s ease; }
        .m-carb { background: var(--amber); transition: width 0.5s ease; }
        .m-fat { background: var(--red); transition: width 0.5s ease; }
        
        /* Nuovi stili per i bottoni dei macro */
        .macro-legend { display: flex; justify-content: space-between; font-size: 12px; font-weight: 800; gap: 8px; margin-bottom: 15px; }
        .macro-btn { flex: 1; padding: 10px 5px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px var(--shadow); }
        .macro-btn:active { transform: scale(0.95); background: var(--bg); }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h2>Dieta</h2>
            <button class="btn-circle" onclick="setKey()" title="Chiave API">🔑</button>
        </div>
        <div class="header-right">
            <button class="btn-circle" onclick="openDailyInfo()" title="Recap Giornata">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
            </button>
            <div class="kcal-box"><div class="kcal-num" id="remKcal">2000</div><div class="kcal-label">Kcal Rimaste</div></div>
        </div>
    </div>
    <div class="tabs" id="tabList"></div>
    <div id="app"></div>
    <div id="overlay" class="overlay"><div class="popup" id="popupContent"></div></div>

<script>
// ---------- INSERISCI IL TUO URL QUI SOTTO ----------
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxxEzXCd4a8_5uzvhGGvyrWVlsBb0W7rHVOZQOYzSMoKEQU2t4o0DEVPTX3TsQMvWsZ5Q/exec";

let allData = [], selectedDate = "", activeId = null, currentFood = "", currentKcal = 0, remKcalVal = 0, activePasto = "";
let step1Main = "", step2Side = "";
let currentInfoItems = []; // Variabile per memorizzare gli ingredienti attualmente visualizzati nel grafico

function setKey() { const k = prompt("Incolla Chiave Gemini:"); if(k) localStorage.setItem('gem_key', k); }

async function load() {
    try {
        const r = await fetch(SCRIPT_URL);
        allData = await r.json();
        const dates = [...new Set(allData.map(x => x.Data))];
        if(!selectedDate) selectedDate = dates[0];
        render();
    } catch(e) { console.error("Errore di caricamento."); }
}

function render() {
    document.getElementById('tabList').innerHTML = [...new Set(allData.map(x => x.Data))].map(d => `<div class="tab ${d===selectedDate?'active':''}" onclick="selectedDate='${d}';render()">${d}</div>`).join('');
    const cont = document.getElementById('app'); cont.innerHTML = "";
    const dayData = allData.filter(x => x.Data === selectedDate);
    const groups = dayData.reduce((acc, x) => { const p = x.Pasto || "Altro"; if(!acc[p]) acc[p] = []; acc[p].push(x); return acc; }, {});

    let consumate = 0;
    dayData.forEach(item => {
        const isSub = String(item.ID).includes('.');
        const done = String(item.Fatto).toUpperCase() === "TRUE";
        if (done) {
            if (isSub) {
                const fatherId = String(item.ID).split('.')[0];
                const father = dayData.find(x => String(x.ID) === fatherId);
                if (!father || String(father.Fatto).toUpperCase() !== "TRUE") consumate += Math.round(Number(item.Calorie)||0);
            } else { consumate += Math.round(Number(item.Calorie)||0); }
        }
    });
    remKcalVal = 2000 - consumate;
    document.getElementById('remKcal').innerText = remKcalVal;

    for(const [pasto, items] of Object.entries(groups)) {
        const groupDiv = document.createElement('div'); groupDiv.className = "meal-group";
        
        const firstFather = items.find(i => !String(i.ID).includes('.'));
        let suggClick = "alert('Aggiungi prima un piatto base con il tasto + da poter sostituire!')";
        if (firstFather) {
            const fName = firstFather.Alimento.replace(/^->\s*/, '').replace(/'/g, "\\'");
            const fKcal = Math.round(Number(firstFather.Calorie) || 0);
            suggClick = `openStep1('${firstFather.ID}', '${fName}', ${fKcal})`;
        }

        groupDiv.innerHTML = `
            <div class="meal-header">
                <div class="meal-title">${pasto}</div>
                <div class="header-btns">
                    <button class="info-btn" onclick="openMealInfo('${pasto}')" title="Info Macros">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    </button>
                    <button class="sugg-btn" onclick="${suggClick}" title="Suggerisci Piatto Keto">✨</button>
                    <button class="add-btn" onclick="openAdd('${pasto}')" title="Aggiungi Elemento">+</button>
                </div>
            </div>`;
            
        const card = document.createElement('div'); card.className = "card";
        items.forEach(item => {
            const isSub = String(item.ID).includes('.');
            const done = String(item.Fatto).toUpperCase() === "TRUE";
            const cleanName = item.Alimento.replace(/^->\s*/, '');
            const weight = Number(item['Peso gr']) || 0;
            
            const weightText = weight > 0 ? ` <span>- ${weight}g</span>` : '';

            card.innerHTML += `<div class="row ${isSub?'sub':''}">
                <div class="check ${done?'active':''}" onclick="toggle('${item.ID}',${done},${!isSub})">✓</div>
                <div class="info">
                    <div class="name ${!isSub?'father':''}">${cleanName}${weightText}</div>
                    <div class="macros">P:${item.Prot} C:${item.Carb} G:${item.Grassi}</div>
                </div>
                <div class="kcal-val">${item.Calorie}</div>
                <div class="actions">
                    <button class="action-icon" onclick="openEdit('${item.ID}','${cleanName.replace(/'/g, "\\'")}', '${weight}')">✏️</button>
                    <button class="action-icon del-icon" onclick="deleteItem('${item.ID}')">🗑️</button>
                </div>
            </div>`;
        });
        groupDiv.appendChild(card); cont.appendChild(groupDiv);
    }
}

// ================= MODIFICA AVANZATA (MATITA) =================
function openEdit(id, currentName, currentWeight) {
    activeId = id;
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('popupContent').innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <h3>Modifica Alimento</h3>
            <button onclick="document.getElementById('overlay').style.display='none'" style="border:none; background:none; font-size:24px;">&times;</button>
        </div>
        <p style="font-size:12px; color:var(--muted)">L'IA ricalcolerà i macro keto se modifichi il nome o i grammi.</p>
        <div style="margin: 15px 0;">
            <label style="font-size:12px; font-weight:bold;">Alimento / Nome</label>
            <input type="text" id="editName" value="${currentName}" style="width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text);">
        </div>
        <div style="margin: 15px 0;">
            <label style="font-size:12px; font-weight:bold;">Grammi (g)</label>
            <input type="number" id="editWeight" value="${currentWeight}" style="width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text);">
        </div>
        <button onclick="saveEdit()" style="width:100%; padding:15px; background:var(--green); color:#fff; border:none; border-radius:12px; font-weight:bold; font-size:16px;">Salva Modifiche</button>
    `;
}

async function saveEdit() {
    const newName = document.getElementById('editName').value;
    const newWeight = document.getElementById('editWeight').value;
    const key = localStorage.getItem('gem_key');
    if(!key) return alert("Inserisci la chiave 🔑");
    
    document.getElementById('popupContent').innerHTML = "<div style='text-align:center; padding:20px; font-weight:bold;'>Calcolo nuovi macros... ⏳</div>";
    
    const prompt = `Ricalcola i valori nutrizionali per '${newName}' con un peso esatto di ${newWeight} grammi. Restituisci SOLO un oggetto JSON valido: {"alimento": "${newName}", "peso": ${newWeight}, "calorie": 150, "prot": 10, "carb": 5, "grassi": 8}`;
    
    try {
        const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'proxyAI', key, prompt }) });
        const d = await r.json();
        let text = d.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim();
        let item = JSON.parse(text);
        
        if (Array.isArray(item)) item = item[0];
        item.alimento = item.alimento || item.nome || newName;
        item.peso = item.peso || newWeight;
        item.calorie = item.calorie || item.kcal || 0;
        item.prot = item.prot || item.proteine || 0;
        item.carb = item.carb || item.carboidrati || 0;
        item.grassi = item.grassi || item.fat || 0;

        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'editSingleItem', id: activeId, item }) });
        document.getElementById('overlay').style.display = 'none'; load();
    } catch(e) { alert("Errore durante il calcolo. Riprova."); document.getElementById('overlay').style.display = 'none'; }
}

// ================= VISTA INFO E GRAFICI (CON DRILL-DOWN) =================
function openMealInfo(pasto) {
    const items = allData.filter(x => x.Data === selectedDate && x.Pasto === pasto);
    showMacroPopup(`Riepilogo ${pasto}`, items);
}

function openDailyInfo() {
    const items = allData.filter(x => x.Data === selectedDate);
    showMacroPopup(`Recap Giornata`, items, "Calorie Totali Pianificate");
}

function showMacroPopup(title, items, subtitle = "Calorie Totali") {
    currentInfoItems = items; // Salviamo gli elementi per la funzione renderMacroDetails
    let tKcal = 0, tP = 0, tC = 0, tF = 0;
    
    items.forEach(item => {
        const isSub = String(item.ID).includes('.');
        const hasChildren = !isSub && items.some(child => String(child.ID).startsWith(item.ID + '.'));

        if (!hasChildren) {
            tKcal += Number(item.Calorie) || 0;
            tP += Number(item.Prot) || 0;
            tC += Number(item.Carb) || 0;
            tF += Number(item.Grassi) || 0;
        }
    });

    const totalMacros = (tP + tC + tF) || 1; 
    const pPct = (tP / totalMacros) * 100;
    const cPct = (tC / totalMacros) * 100;
    const fPct = (tF / totalMacros) * 100;

    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('popupContent').innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
            <h3 style="margin:0; font-size:22px;">${title}</h3>
            <button onclick="document.getElementById('overlay').style.display='none'" style="border:none; background:none; font-size:24px;">&times;</button>
        </div>
        
        <div style="text-align:center; margin-bottom:15px; padding:20px; background:var(--bg); border-radius:16px; border:1px solid var(--border);">
            <div style="font-size:38px; font-weight:800; color:var(--text); line-height:1;">${Math.round(tKcal)}</div>
            <div style="font-size:12px; color:var(--muted); text-transform:uppercase; font-weight:700; margin-top:5px;">${subtitle}</div>
            
            <div class="macro-bar">
                <div class="m-prot" style="width:${pPct}%"></div>
                <div class="m-carb" style="width:${cPct}%"></div>
                <div class="m-fat" style="width:${fPct}%"></div>
            </div>
            
            <div class="macro-legend">
                <div class="macro-btn" style="color:var(--blue)" onclick="renderMacroDetails('prot')">PROT: ${Math.round(tP)}g</div>
                <div class="macro-btn" style="color:var(--amber)" onclick="renderMacroDetails('carb')">CARB: ${Math.round(tC)}g</div>
                <div class="macro-btn" style="color:var(--red)" onclick="renderMacroDetails('grassi')">GRAS: ${Math.round(tF)}g</div>
            </div>
        </div>
        
        <div id="macroDetailsList" style="text-align:left; margin-bottom:20px; min-height:40px;">
            <div style="font-size:12px; color:var(--muted); text-align:center; padding:10px;">Premi su un Macro qui sopra per vederne le fonti 👆</div>
        </div>

        <button onclick="document.getElementById('overlay').style.display='none';" style="width:100%; padding:15px; border-radius:12px; border:none; background:var(--text); color:var(--bg); font-weight:bold; font-size:16px; cursor:pointer;">Chiudi</button>
    `;
}

// Funzione per generare la classifica degli alimenti per macro
function renderMacroDetails(type) {
    let title = type === 'prot' ? 'Proteine' : type === 'carb' ? 'Carboidrati' : 'Grassi';
    let color = type === 'prot' ? 'var(--blue)' : type === 'carb' ? 'var(--amber)' : 'var(--red)';
    
    // Filtriamo solo gli ingredienti "veri" (foglie)
    let leaves = currentInfoItems.filter(item => {
        const isSub = String(item.ID).includes('.');
        const hasChildren = !isSub && currentInfoItems.some(child => String(child.ID).startsWith(item.ID + '.'));
        return !hasChildren;
    });

    // Mappiamo, filtriamo gli zeri e ordiniamo dal più alto al più basso
    let mapped = leaves.map(item => {
        let val = 0;
        if(type === 'prot') val = Number(item.Prot) || 0;
        if(type === 'carb') val = Number(item.Carb) || 0;
        if(type === 'grassi') val = Number(item.Grassi) || 0;
        return { name: item.Alimento.replace(/^->\s*/, ''), val: val };
    }).filter(x => x.val > 0).sort((a,b) => b.val - a.val);

    let listHtml = '';
    if(mapped.length === 0) {
        listHtml = `<div style="font-size:13px; color:var(--muted); text-align:center;">Nessun alimento fornisce ${title.toLowerCase()}.</div>`;
    } else {
        listHtml = mapped.map(x => `
            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px;">
                <span>${x.name}</span>
                <b style="color:${color}">${Math.round(x.val)}g</b>
            </div>
        `).join('');
    }

    document.getElementById('macroDetailsList').innerHTML = `
        <h4 style="margin-bottom:10px; color:${color}; font-size:12px; text-transform:uppercase; font-weight:800;">Top Fonti di ${title}</h4>
        ${listHtml}
    `;
}

// ================= SUGGERISCI (CHEF EDITION) =================
function openStep1(id, food, kcal) {
    activeId = id; currentFood = food; currentKcal = kcal;
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('popupContent').innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <h3>Passo 1 di 2</h3>
            <button onclick="document.getElementById('overlay').style.display='none'" style="border:none; background:none; font-size:24px;">&times;</button>
        </div>
        <p style="margin-bottom:20px; font-size:14px; color:var(--muted);">Scegli la <b>proteina principale</b> per sostituire ${currentFood}:</p>
        <div class="cat-grid">
            <button class="cat-btn" onclick="selectMain('Pesce')">🐟 Pesce</button>
            <button class="cat-btn" onclick="selectMain('Carne')">🥩 Carne bianca/rossa</button>
            <button class="cat-btn" onclick="selectMain('Uova')">🍳 Uova</button>
            <button class="cat-btn" onclick="selectMain('Formaggi')">🧀 Formaggio o Latticini</button>
        </div>
        <div class="custom-input">
            <input type="text" id="customMain" placeholder="Oppure scrivilo (es. Tofu)">
            <button class="create-btn" onclick="selectMain(document.getElementById('customMain').value)">Avanti</button>
        </div>
    `;
}

function selectMain(val) {
    if(!val) return;
    step1Main = val;
    const popup = document.getElementById('popupContent');
    popup.innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <h3>Passo 2 di 2</h3>
            <button onclick="document.getElementById('overlay').style.display='none'" style="border:none; background:none; font-size:24px;">&times;</button>
        </div>
        <p style="margin-bottom:20px; font-size:14px; color:var(--muted);">E come <b>contorno</b> cosa abbiniamo a ${step1Main}?</p>
        <div class="cat-grid">
            <button class="cat-btn" onclick="generateFinal('Verdure cotte o grigliate')">🥗 Verdure Cotte</button>
            <button class="cat-btn" onclick="generateFinal('Insalata fresca')">🥬 Insalata Fresca</button>
            <button class="cat-btn" onclick="generateFinal('Avocado o Noci')">🥑 Grassi Sani</button>
            <button class="cat-btn" onclick="generateFinal('Nessun contorno')">❌ Solo ${step1Main}</button>
        </div>
        <div class="custom-input">
            <input type="text" id="customSide" placeholder="Es. Spinaci al burro">
            <button class="create-btn" onclick="generateFinal(document.getElementById('customSide').value)">Genera</button>
        </div>
    `;
}

async function generateFinal(side) {
    if(!side) return;
    step2Side = side;
    const key = localStorage.getItem('gem_key');
    if(!key) return alert("Inserisci la chiave 🔑");
    
    const popup = document.getElementById('popupContent');
    popup.innerHTML = "<div style='text-align:center; padding:30px;'><h3>👨‍🍳 Lo Chef sta cucinando...</h3><p style='color:var(--muted)'>Calcolo le grammature perfette per ${currentKcal} kcal.</p></div>";
    
    const prompt = `Crea 4 piatti sani composti principalmente da "${step1Main}" e come contorno "${step2Side}" (il totale esatto deve essere circa ${currentKcal} kcal). Bilancia le grammature di entrambi. Rispondi SOLO array JSON: [{"alimento": "Nome Ricetta", "calorie": 400, "prot": 30, "carb": 5, "grassi": 25, "istruzioni": "1. Cuoci la carne... 2. Aggiungi il sale...", "ingredienti": [{"nome": "Ingrediente", "peso": 150, "calorie": 200, "prot": 15, "carb": 2, "grassi": 10}]}]`;
    
    try {
        const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'proxyAI', key, prompt }) });
        const d = await r.json();
        const opts = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, ""));
        popup.innerHTML = `
            <h3 style="margin-bottom:15px;">Scegli la tua variante</h3>
            ${opts.map((o) => `
                <div class="opt-card" onclick='applyRecipe(${JSON.stringify(o).replace(/'/g, "&apos;")})'>
                    <b style="font-size:16px;">${o.alimento}</b><br>
                    <small style="color:var(--green); font-weight:bold;">${o.calorie} kcal | P:${o.prot} C:${o.carb} G:${o.grassi}</small>
                </div>
            `).join('')}
            <button onclick="openStep1(activeId, currentFood, currentKcal)" style="width:100%; padding:12px; margin-top:10px; background:var(--bg); border:1px solid var(--border); border-radius:12px; font-weight:bold; color:var(--text);">Indietro</button>
        `;
    } catch(e) { popup.innerHTML = "Errore IA. Riprova."; }
}

async function applyRecipe(recipe) {
    const popup = document.getElementById('popupContent');
    popup.innerHTML = "<div style='text-align:center; padding:30px;'><h3>Salvataggio su Google Fogli... ⏳</h3></div>";
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'replaceRecipe', id: activeId, recipe }) });
    
    let ingStr = recipe.ingredienti.map(i => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border);"><span>• ${i.nome}</span> <b>${i.peso}g</b></div>`).join('');
    const istruzioni = recipe.istruzioni ? recipe.istruzioni.replace(/\n/g, "<br>") : "Nessuna istruzione fornita dall'IA.";
    
    popup.innerHTML = `
        <h2 style="color:var(--green); margin-bottom:5px;">Piatto aggiunto! 🎉</h2>
        <p style="color:var(--muted); font-size:13px; margin-bottom:20px;">Dati sincronizzati su Fogli.</p>
        
        <div style="background:var(--bg); padding:20px; border-radius:16px; border:1px solid var(--border); margin-bottom:20px;">
            <h3 style="margin-bottom:15px; color:var(--text); line-height:1.2;">${recipe.alimento}</h3>
            ${ingStr}
            
            <div id="recipeBox" style="display:none; margin-top:15px; padding-top:15px; border-top:1px dashed var(--border); font-size:14px; line-height:1.5;">
                <b style="color:var(--amber);">Preparazione:</b><br><br>
                ${istruzioni}
            </div>
        </div>
        
        <button onclick="document.getElementById('recipeBox').style.display='block'; this.style.display='none';" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-weight:bold; font-size:16px; cursor:pointer;">📖 Mostra Ricetta</button>
        <button onclick="document.getElementById('overlay').style.display='none'; load()" style="width:100%; padding:15px; border-radius:12px; border:none; background:var(--text); color:var(--bg); font-weight:bold; font-size:16px; cursor:pointer;">Chiudi</button>
    `;
}

// ================= AZIONI BASE =================
function toggle(id, curr, isFather) {
    const ns = !curr ? "TRUE" : "FALSE";
    const action = isFather ? "bulkToggle" : "toggleDone";
    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action, id, parentId: id, value: ns }) });
    setTimeout(load, 400);
}

function deleteItem(id) { if(confirm("Eliminare questa riga?")) { fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteRow', id }) }); setTimeout(load, 500); } }

function openAdd(pasto) {
    activePasto = pasto;
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('popupContent').innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h3>Aggiungi a ${pasto}</h3><button onclick="document.getElementById('overlay').style.display='none'" style="border:none;background:none;font-size:24px;">&times;</button></div>
        <p style="font-size:12px; color:var(--muted)">Target attuale: circa ${remKcalVal} kcal rimaste.</p>
        <div style="margin: 15px 0;"><label style="font-size:12px; font-weight:bold;">Alimento</label><input type="text" id="newItemName" placeholder="Es. Mela" style="width:100%; padding:12px; margin-top:5px; border-radius:12px; border:1px solid var(--border); background:var(--bg); color:var(--text);"></div>
        <div style="margin: 15px 0;"><label style="font-size:12px; font-weight:bold;">Grammi (opzionale)</label><input type="number" id="newItemWeight" placeholder="Es. 150" style="width:100%; padding:12px; margin-top:5px; border-radius:12px; border:1px solid var(--border); background:var(--bg); color:var(--text);"></div>
        <button onclick="saveNewItem()" style="width:100%; padding:15px; background:var(--text); color:var(--bg); border:none; border-radius:12px; font-weight:bold;">Aggiungi</button>
    `;
}

async function saveNewItem() {
    const name = document.getElementById('newItemName').value;
    const weight = document.getElementById('newItemWeight').value;
    const key = localStorage.getItem('gem_key');
    if(!key) return alert("Inserisci la chiave 🔑");
    document.getElementById('popupContent').innerHTML = "<div style='text-align:center; padding:30px;'>L'IA calcola... ⏳</div>";
    let wInst = weight ? `per ${weight}g` : `per circa ${remKcalVal} kcal`;
    const prompt = `Valori per "${name}" ${wInst}. NO RICETTE. SOLO JSON: {"alimento": "${name}", "calorie": 150, "peso": ${weight||100}, "prot": 5, "carb": 15, "grassi": 2}`;
    try {
        const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'proxyAI', key, prompt }) });
        const d = await r.json();
        let item = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim());
        if (Array.isArray(item)) item = item[0];
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'addNewItem', pasto: activePasto, data: selectedDate, item }) });
        document.getElementById('overlay').style.display = 'none'; load();
    } catch(e) { alert("Errore IA"); load(); }
}

window.onload = load;
</script>
</body>
</html>
