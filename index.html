<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Piano Alessio Pro v8</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a18; --surface: #222220; --card: #2a2a26; --border: #383832;
            --green: #7ab648; --green-dim: #1e2d12; --amber: #e8962a; --amber-dim: #332310;
            --text: #f0ede6; --muted: #888878; --done-bg: #141f0c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; padding-bottom: 80px; }
        
        header { background: linear-gradient(155deg, #1c2e10 0%, #0d1808 100%); padding: 20px 16px; border-bottom: 1px solid #304018; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
        h1 em { color: var(--green); font-style: italic; }
        
        .kcal-box { background: var(--green-dim); border: 1px solid #3a5020; border-radius: 10px; padding: 8px 12px; text-align: center; min-width: 90px; }
        .kcal-num { display: block; font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--green); line-height: 1; }
        .kcal-lbl { font-size: 9px; text-transform: uppercase; color: var(--muted); }

        .tab-wrap { background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; position: sticky; top: 88px; z-index: 90; }
        .tabs { display: flex; padding: 0 10px; }
        .tab { flex-shrink: 0; padding: 12px 16px; text-align: center; color: var(--muted); border-bottom: 2px solid transparent; cursor: pointer; }
        .tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }
        .tab.is-today { background: rgba(122, 182, 72, 0.1); }
        .tab .dn { display: block; font-size: 1.1rem; font-family: 'Playfair Display'; }

        .main { padding: 15px; max-width: 600px; margin: 0 auto; min-height: 300px; }
        .meal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .meal-card.done { background: var(--done-bg); border-color: var(--green-dim); opacity: 0.8; }
        
        .meal-header { display: flex; align-items: center; padding: 12px; gap: 12px; border-bottom: 1px solid var(--border); }
        .meal-name { flex: 1; font-weight: 600; font-size: 14px; }
        .meal-kcal { color: var(--amber); font-weight: 700; font-size: 13px; }
        
        .check-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: none; color: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .check-btn.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }

        .food-detail { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .food-text { font-size: 13px; color: var(--text); flex: 1; padding-right: 10px; }
        .sub-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 400; display: none; flex-direction: column; justify-content: flex-end; }
        .popup { background: var(--surface); border-top: 2px solid var(--green); border-radius: 20px 20px 0 0; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .option-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .option-title { font-weight: 600; font-size: 14px; }
        .option-kcal { color: var(--amber); font-size: 12px; }

        .ai-fab { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #000; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 200; cursor: pointer; border: none; }
        .ai-panel { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: none; flex-direction: column; }
        .ai-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .msg.bot { align-self: flex-start; background: var(--card); border: 1px solid var(--border); }
        .msg.user { align-self: flex-end; background: var(--green-dim); color: var(--green); }
        .ai-input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { border: 4px solid var(--surface); border-top: 4px solid var(--green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header>
    <div class="header-top">
        <div>
            <div class="eyebrow" style="font-size:9px; color:var(--green); letter-spacing:2px;">PIANO ALESSIO</div>
            <h1>Ciao <em>Alessio</em> 👋</h1>
        </div>
        <div class="kcal-box">
            <span class="kcal-num" id="remKcal">2000</span>
            <span class="kcal-lbl">kcal rimaste</span>
        </div>
    </div>
</header>

<div class="tab-wrap"><div class="tabs" id="tabs"></div></div>
<div class="main" id="app"></div>

<div id="subOverlay" class="overlay" onclick="this.style.display='none'">
    <div class="popup" onclick="event.stopPropagation()">
        <h3 style="margin-bottom:15px;">Sostituisci Pasto</h3>
        <div id="optionsContainer"></div>
        <div class="search-area">
            <input type="text" id="customSearch" style="width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; margin-bottom: 10px; outline: none;" placeholder="Cerca altro...">
            <button onclick="searchCustom()" style="width:100%; padding:12px; background:var(--green); border:none; border-radius:10px; font-weight:700; color:#000;">Cerca con IA</button>
        </div>
    </div>
</div>

<button class="ai-fab" onclick="toggleAI()">🤖</button>
<div id="aiPanel" class="ai-panel">
    <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
        <button onclick="setApiKey()" style="background:var(--card); border:1px solid var(--border); color:var(--muted); font-size:10px; padding:5px 10px; border-radius:5px;">Configura Chiave API</button>
        <button onclick="toggleAI()" style="background:none; border:none; color:var(--muted); font-size:20px;">✕</button>
    </div>
    <div id="aiMessages" class="ai-messages">
        <div class="msg bot">Ciao Alessio! Inserisci la tua chiave API Claude cliccando in alto a sinistra per attivare l'assistente. 💪</div>
    </div>
    <div class="ai-input-area">
        <input type="text" id="aiInput" style="flex:1; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:10px; color:#fff;" placeholder="Chiedi...">
        <button onclick="sendChat()" style="background:var(--green); border:none; border-radius:50%; width:40px; height:40px; color:#000;">➤</button>
    </div>
</div>

<script>
// --- INCOLLA QUI IL NUOVO URL DEL DEPLOYMENT ---
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNbcmLNqowYPbpE-fu49xEY-U6Yh5X_0NGU_EPxU9rl2yq-iQG-ckB7_D2uD3dpBVqUA/exec";
const TARGET_KCAL = 2000;

let allData = [];
let selectedDate = new Date().toLocaleDateString('it-IT');
let currentSubId = null;

function setApiKey() {
    const key = prompt("Incolla qui la tua chiave API Claude (sk-ant-...):");
    if (key) {
        localStorage.setItem('ale_api_key', key);
        alert("Chiave salvata correttamente!");
    }
}

function getClaudeKey() {
    return localStorage.getItem('ale_api_key') || "";
}

async function loadData() {
    try {
        const response = await fetch(SCRIPT_URL);
        if (!response.ok) throw new Error("Errore rete");
        allData = await response.json();
        renderTabs();
        renderApp();
        document.getElementById('loader').style.display = 'none';
    } catch (e) {
        document.getElementById('loader').innerHTML = `<p style="color:red; padding:20px; text-align:center;">Errore connessione!<br>Verifica il Deployment su Google Script.</p>`;
    }
}

function renderTabs() {
    const tabs = document.getElementById('tabs'); tabs.innerHTML = "";
    const uniqueDates = [...new Set(allData.map(item => item.Data))].sort((a,b) => {
        const d1 = a.split('/').reverse().join('');
        const d2 = b.split('/').reverse().join('');
        return d1.localeCompare(d2);
    });
    const oggi = new Date().toLocaleDateString('it-IT');
    uniqueDates.forEach(dateStr => {
        const parts = dateStr.split('/');
        const tab = document.createElement('div');
        tab.className = `tab ${dateStr === selectedDate ? 'active' : ''} ${dateStr === oggi ? 'is-today' : ''}`;
        tab.innerHTML = `<span class="dn">${parts[0]}</span><span class="dl">${new Date(parts[2], parts[1]-1, parts[0]).toLocaleDateString('it-IT', { weekday: 'short' })}</span>`;
        tab.onclick = () => { selectedDate = dateStr; renderTabs(); renderApp(); };
        tabs.appendChild(tab);
    });
}

function renderApp() {
    const container = document.getElementById('app'); container.innerHTML = "";
    const dietaGiorno = allData.filter(r => r.Data === selectedDate);
    let kcalConsumate = 0;

    dietaGiorno.forEach(item => {
        const kcal = parseInt(item.Calorie) || 0;
        const isDone = item.Fatto === "TRUE" || item.Fatto === true;
        if (isDone) kcalConsumate += kcal;

        const card = document.createElement('div');
        card.className = `meal-card ${isDone ? 'done' : ''}`;
        card.innerHTML = `
            <div class="meal-header">
                <button class="check-btn ${isDone ? 'active' : ''}" onclick="toggleDone('${item.ID}', ${isDone})">✓</button>
                <div class="meal-name">${item['Tipologia Pasto']}</div>
                <div class="meal-kcal">${kcal} kcal</div>
            </div>
            <div class="food-detail">
                <div class="food-text">${item.Alimento}</div>
                <button class="sub-btn" onclick="openSubPopup('${item.ID}', '${item.Alimento}', ${kcal})">↺ Sostituisci</button>
            </div>`;
        container.appendChild(card);
    });
    document.getElementById('remKcal').textContent = TARGET_KCAL - kcalConsumate;
}

async function toggleDone(id, currentStatus) {
    const newStatus = !currentStatus;
    const item = allData.find(i => i.ID == id);
    if(item) item.Fatto = newStatus ? "TRUE" : "FALSE";
    renderApp();
    await fetch(SCRIPT_URL, { 
        method: 'POST', 
        mode: 'no-cors', 
        body: JSON.stringify({ action: 'toggleDone', id: id.toString(), value: newStatus.toString().toUpperCase() }) 
    });
}

async function openSubPopup(id, food, kcal) {
    const key = getClaudeKey();
    if (!key) { alert("Configura la chiave API nel chatbot!"); return; }
    currentSubId = id;
    document.getElementById('subOverlay').style.display = 'flex';
    document.getElementById('optionsContainer').innerHTML = '<p style="font-size:12px; color:var(--muted)">Generando alternative...</p>';
    
    try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
            body: JSON.stringify({
                model: "claude-3-haiku-20240307",
                max_tokens: 400,
                messages: [{role: "user", content: `L'utente mangia "${food}" (${kcal} kcal). Proponi 4 alternative diverse ma con kcal simili. Rispondi SOLO con un array JSON pulito: [{"alimento": "nome e peso", "calorie": numero}]`}]
            })
        });
        const data = await response.json();
        const jsonMatch = data.content[0].text.match(/\[.*\]/s);
        const opts = JSON.parse(jsonMatch[0]);
        let html = "";
        opts.forEach(o => {
            html += `<div class="option-card" onclick="applySub('${o.alimento.replace(/'/g, "\\'")}', ${o.calorie})">
                <div class="option-title">${o.alimento}</div>
                <div class="option-kcal">${o.calorie} kcal</div>
            </div>`;
        });
        document.getElementById('optionsContainer').innerHTML = html;
    } catch (e) { document.getElementById('optionsContainer').innerHTML = "Errore IA."; }
}

async function searchCustom() {
    const key = getClaudeKey();
    const q = document.getElementById('customSearch').value;
    if(!q || !key) return;
    document.getElementById('optionsContainer').innerHTML = "Analizzo...";
    const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
            model: "claude-3-haiku-20240307",
            max_tokens: 200,
            messages: [{role: "user", content: `Calcola grammi e calorie per: "${q}". Rispondi SOLO JSON: {"alimento": "nome e peso", "calorie": numero}`}]
        })
    });
    const data = await response.json();
    const jsonMatch = data.content[0].text.match(/\{.*\}/s);
    const res = JSON.parse(jsonMatch[0]);
    applySub(res.alimento, res.calorie);
}

async function applySub(f, k) {
    const item = allData.find(i => i.ID == currentSubId);
    if(item) {
        item.Alimento = f; item.Calorie = k;
        renderApp();
    }
    document.getElementById('subOverlay').style.display = 'none';
    await fetch(SCRIPT_URL, { 
        method: 'POST', 
        mode: 'no-cors', 
        body: JSON.stringify({ action: 'replace', id: currentSubId.toString(), newFood: f, newCalories: k }) 
    });
}

function toggleAI() {
    const p = document.getElementById('aiPanel');
    p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
}

async function sendChat() {
    const key = getClaudeKey();
    const input = document.getElementById('aiInput');
    const msg = input.value; if(!msg || !key) return;
    addMsg('user', msg); input.value = "";
    
    try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
            body: JSON.stringify({
                model: "claude-3-haiku-20240307",
                max_tokens: 300,
                system: "Sei l'assistente di Alessio (145kg). Dieta 2000 kcal. Sii motivante e breve.",
                messages: [{role: "user", content: msg}]
            })
        });
        const data = await response.json();
        addMsg('bot', data.content[0].text);
    } catch (e) { addMsg('bot', "Errore connessione Claude."); }
}

function addMsg(role, text) {
    const d = document.createElement('div');
    d.className = `msg ${role}`; d.textContent = text;
    document.getElementById('aiMessages').appendChild(d);
    document.getElementById('aiMessages').scrollTop = 9999;
}

window.onload = loadData;
</script>
</body>
</html>
