<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST GEMINI DEFINITIVO</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .btn { background: #1a73e8; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; color: #fff; margin-bottom: 10px; cursor: pointer; }
        #debug { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; text-align: left; font-family: monospace; font-size: 11px; margin-top: 20px; white-space: pre-wrap; color: #00e5ff; }
    </style>
</head>
<body>
    <h2>Test Gemini Gratis</h2>
    <button class="btn" style="background:#444" onclick="setKey()">1. IMPOSTA CHIAVE GEMINI</button>
    <button class="btn" onclick="runTest()">2. TESTA CONNESSIONE</button>
    <div id="status">In attesa...</div>
    <div id="debug">Dettagli tecnici...</div>

<script>
const SCRIPT_URL = "INCOLLA_IL_TUO_URL_DI_GOOGLE";

function setKey() {
    const k = prompt("Incolla la chiave API di Google Gemini (da aistudio.google.com):");
    if(k) localStorage.setItem('gemini_key', k);
}

async function runTest() {
    const key = localStorage.getItem('gemini_key');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');
    if(!key) return alert("Inserisci la chiave!");

    status.innerText = "Chiamata a Google...";
    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'proxyAI', key: key, prompt: 'Rispondi con "OK"' })
        });

        const text = await response.text();
        debug.innerText = "RISPOSTA:\n" + text;

        if (text.startsWith("<!DOCTYPE html>")) {
            status.innerText = "ERRORE: Lo script Google è configurato male (Permessi!).";
        } else {
            const data = JSON.parse(text);
            if(data.candidates) {
                status.innerText = "FUNZIONA! Gemini ha risposto.";
                status.style.color = "#32d74b";
            }
        }
    } catch (e) {
        status.innerText = "ERRORE: " + e.message;
    }
}
</script>
</body>
</html>
