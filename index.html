<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TEST MINIMO</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        button { background: #32d74b; border: none; padding: 20px; border-radius: 10px; font-weight: bold; width: 100%; max-width: 300px; cursor: pointer; margin: 10px 0; }
        #status { margin: 20px; color: #888; font-size: 14px; border: 1px solid #333; padding: 20px; min-height: 50px; word-break: break-all; }
    </style>
</head>
<body>

    <h2>Test IA Diretto</h2>
    <button onclick="setKey()">1. IMPOSTA CHIAVE</button><br>
    <button onclick="runTest()">2. TESTA IA (Uova e Bacon)</button>

    <div id="status">In attesa...</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxPQ3NW9ceSIHovrOTJXtyI_HSKkKdfslOa8YmElYd5VSjJ2vIo2S8wbFk05WQ5Yghu/exec";

function setKey() {
    const k = prompt("Incolla la tua chiave API Claude (sk-ant...):");
    if(k) { localStorage.setItem('test_key', k); alert("Chiave salvata!"); }
}

async function runTest() {
    const key = localStorage.getItem('test_key');
    const status = document.getElementById('status');
    if(!key) return alert("Imposta prima la chiave!");

    status.innerText = "Chiamata in corso...";

    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'proxyClaude',
                key: key,
                prompt: 'Sostituisci "Uova e Bacon" con 3 alternative keto. Rispondi solo in JSON: [{"a": "nome", "k": 400}]'
            })
        });

        const data = await response.json();
        // Claude restituisce un oggetto 'content'
        const text = data.content[0].text;
        status.innerText = "RISPOSTA IA: " + text;
        status.style.color = "#32d74b";

    } catch (e) {
        status.innerText = "ERRORE: " + e.message;
        status.style.color = "#ff453a";
    }
}
</script>
</body>
</html>
