<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA IA RIPRISTINATO</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .btn { background: #32d74b; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; color: #000; margin-bottom: 10px; cursor: pointer; }
        #debug { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; text-align: left; font-family: monospace; font-size: 11px; margin-top: 20px; white-space: pre-wrap; color: #00ff00; }
    </style>
</head>
<body>
    <h2>Test Canale Claude 3.5</h2>
    <button class="btn" style="background:#8e8e93" onclick="setKey()">1. IMPOSTA CHIAVE</button>
    <button class="btn" onclick="runTest()">2. TESTA CONNESSIONE</button>

    <div id="status" style="margin-top:20px; font-weight:bold;">Stato: In attesa</div>
    <div id="debug">Dettagli tecnici...</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxo7-jEhBMKCFO0S0YXEd5iMTrwA0Q3Ka6vuHH-1q5C6oAQv84r0v6yyh-0iCWYFaLtsQ/exec";

function setKey() {
    const k = prompt("Incolla chiave sk-ant...:");
    if(k) localStorage.setItem('claude_key', k);
}

async function runTest() {
    const key = localStorage.getItem('claude_key');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');
    
    if(!key) return alert("Inserisci la chiave!");

    status.innerText = "Chiamando Claude 3.5...";
    status.style.color = "#ff9f0a";

    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'proxyClaude',
                key: key,
                prompt: 'Rispondi solo con la parola "SISTEMA OPERATIVO"'
            })
        });

        const rawData = await response.text();
        debug.innerText = "RISPOSTA SERVER:\n" + rawData;
        const data = JSON.parse(rawData);
        
        if (data.content && data.content[0]) {
            status.innerText = "IA FUNZIONANTE! Claude 3.5 ha risposto.";
            status.style.color = "#32d74b";
        } else {
            status.innerText = "ERRORE: Controlla il Debug sotto.";
            status.style.color = "#ff453a";
        }
    } catch (e) {
        status.innerText = "ERRORE DI RETE";
        debug.innerText = e.toString();
    }
}
</script>
</body>
</html>
