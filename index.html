<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Piano Alessio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a18; --surface: #222220; --card: #2a2a26; --border: #383832;
            --green: #7ab648; --green-dim: #1e2d12; --amber: #e8962a; --amber-dim: #332310;
            --red: #e05a3a; --red-dim: #2e1410; --text: #f0ede6; --muted: #888878;
            --done-bg: #141f0c; --done-text: #4a6a2a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; min-height: 100vh; }

        header { background: linear-gradient(155deg, #1c2e10 0%, #0d1808 100%); padding: env(safe-area-inset-top, 18px) 16px 13px; padding-top: max(env(safe-area-inset-top, 0px), 18px); border-bottom: 1px solid #304018; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
        .eyebrow { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--green); margin-bottom: 2px; font-weight: 600; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: #f0ede6; }
        h1 em { font-style: italic; color: var(--green); }
        .next-meal { font-size: 11px; color: var(--muted); margin-top: 3px; }
        .next-meal strong { color: var(--amber); }
        .kcal-box { background: var(--green-dim); border: 1px solid #3a5020; border-radius: 10px; padding: 7px 10px; text-align: center; min-width: 85px; flex-shrink: 0; }
        .kcal-box.warning { background: var(--amber-dim); border-color: #5a3a10; }
        .kcal-box.over { background: var(--red-dim); border-color: #5a2010; }
        .kcal-num { display: block; font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--green); line-height: 1; }
        .kcal-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); display: block; margin-top: 1px; }
        .kcal-sub { font-size: 10px; color: var(--muted); display: block; margin-top: 1px; }
        .progress-wrap { margin-top: 9px; background: #1a2810; border-radius: 4px; height: 4px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--green); border-radius: 4px; transition: width .3s ease; }
        .progress-bar.warning { background: var(--amber); }
        .progress-bar.over { background: var(--red); }

        .pills { display: flex; gap: 6px; padding: 9px 14px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
        .pills::-webkit-scrollbar { display: none; }
        .pill { flex-shrink: 0; border-radius: 20px; padding: 3px 10px; font-size: 10px; font-weight: 600; white-space: nowrap; }
        .pill.g { background: var(--green-dim); border: 1px solid #3a5420; color: var(--green); }
        .pill.a { background: var(--amber-dim); border: 1px solid #5a3a10; color: var(--amber); }
        .pill.n { background: var(--card); border: 1px solid var(--border); color: var(--muted); }

        .tab-wrap { background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; position: sticky; top: 104px; z-index: 90; }
        .tabs { display: flex; min-width: max-content; padding: 0 10px; }
        .tab { flex-shrink: 0; padding: 8px 12px 7px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; text-align: center; transition: all .15s; color: var(--muted); position: relative; }
        .tab .dn { display: block; font-family: 'Playfair Display', serif; font-size: 1.1rem; line-height: 1; margin-bottom: 1px; }
        .tab .dl { font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; }
        .tab.active { color: var(--green); border-bottom-color: var(--green); }
        .tab .dot { width: 5px; height: 5px; border-radius: 50%; position: absolute; top: 4px; right: 4px; display: none; }
        .tab.partial .dot { display: block; background: var(--amber); }
        .tab.complete .dot { display: block; background: var(--green); }

        .main { padding: 11px 13px 80px; max-width: 580px; margin: 0 auto; }
        .panel { display: none; } .panel.active { display: block; }

        .day-totals { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; margin-bottom: 11px; }
        .dtbox { background: var(--green-dim); border: 1px solid #3a5020; border-radius: 8px; padding: 7px 4px; text-align: center; }
        .dtbox .num { display: block; font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--green); line-height: 1; margin-bottom: 1px; }
        .dtbox .lbl { font-size: 8px; text-transform: uppercase; letter-spacing: .7px; color: var(--muted); }

        .meal { background: var(--card); border: 1px solid var(--border); border-radius: 11px; margin-bottom: 8px; overflow: hidden; }
        .meal.all-eaten { background: var(--done-bg); border-color: #252e1a; }
        .mh { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-bottom: 1px solid var(--border); }
        .mico { font-size: 16px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: var(--bg); border-radius: 7px; flex-shrink: 0; }
        .minfo { flex: 1; min-width: 0; }
        .mn { font-size: 12px; font-weight: 600; }
        .mt { font-size: 10px; color: var(--muted); margin-top: 1px; }
        .mkcal-badge { font-size: 11px; font-weight: 700; color: var(--amber); background: var(--amber-dim); padding: 2px 8px; border-radius: 20px; flex-shrink: 0; white-space: nowrap; }
        .meal-check { cursor: pointer; padding: 5px 9px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; font-weight: 600; flex-shrink: 0; }

        .item-row { display: grid; grid-template-columns: 26px 1fr auto; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--border); }
        .item-row.item-eaten { background: rgba(20,31,12,0.5); }
        .item-check-btn { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
        .item-check-btn.checked { background: var(--green-dim); border-color: var(--green); color: var(--green); }
        .item-main { padding-left: 10px; }
        .food { font-size: 12px; color: var(--text); }
        .item-kcal { font-size: 11px; color: var(--amber); font-weight: 600; }

        .ai-wrap { display: flex; flex-direction: column; height: calc(100vh - 250px); }
        .ai-messages { flex: 1; overflow-y: auto; padding: 10px 0; display: flex; flex-direction: column; gap: 10px; }
        .ai-msg { max-width: 88%; padding: 9px 12px; border-radius: 12px; font-size: 13px; line-height: 1.55; }
        .ai-msg.user { background: var(--green-dim); color: #c8e8a0; align-self: flex-end; }
        .ai-msg.assistant { background: var(--card); color: var(--text); align-self: flex-start; }
        .ai-input-row { display: flex; gap: 8px; padding: 10px 0; }
        .ai-input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 9px 14px; color: var(--text); outline: none; }
        .ai-send { background: var(--green); border: none; border-radius: 50%; width: 38px; height: 38px; cursor: pointer; }

        .loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { border: 3px solid var(--surface); border-top: 3px solid var(--green); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-size: 12px; color: var(--muted);">Sincronizzazione con Google Sheets...</p>
</div>

<header>
    <div class="header-top">
        <div>
            <div class="eyebrow">Piano Alimentare · Alessio</div>
            <h1>Ciao <em>Alessio</em> 👋</h1>
            <div class="next-meal" id="nextMeal">⏰ Prossimo pasto...</div>
        </div>
        <div class="kcal-box" id="kcalBox">
            <span class="kcal-num" id="kcalNum">—</span>
            <span class="kcal-lbl">kcal rimaste</span>
            <span class="kcal-sub" id="kcalSub"></span>
        </div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
</header>

<div class="pills">
    <div class="pill g">⚡ ~1850 kcal</div>
    <div class="pill g">🥩 Alta proteina</div>
    <div class="pill a">🍚 Low-carb</div>
    <div class="pill n">🍱 5 pasti/die</div>
</div>

<div class="tab-wrap">
    <div class="tabs" id="tabs">
        </div>
</div>

<div class="main" id="mainContent">
    </div>

<script>
// --- CONFIGURAZIONE ---
const WEB_APP_URL = "INCOLLA_QUI_URL_DELLA_TUA_WEB_APP"; 
let DAYS = [];
let currentDay = 0;

// --- CARICAMENTO DATI ---
async function inizializzaApp() {
    try {
        const response = await fetch(WEB_APP_URL);
        const data = await response.json();
        
        if (data && data.length > 0) {
            DAYS = organizzaDati(data);
            renderizzaInterfaccia();
            document.getElementById('loadingScreen').style.display = 'none';
        } else {
            alert("Nessun dato trovato nel foglio Google!");
        }
    } catch (e) {
        console.error("Errore fetch:", e);
        alert("Errore nel collegamento al foglio Google. Controlla il link della Web App.");
    }
}

function organizzaDati(rows) {
    const daysMap = {};
    rows.forEach(row => {
        const d = new Date(row.data);
        const dateStr = d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
        
        if (!daysMap[dateStr]) {
            daysMap[dateStr] = { label: dateStr, total: 1850, meals: [] };
        }
        
        // Cerca se il pasto esiste già in quel giorno
        let meal = daysMap[dateStr].meals.find(m => m.name === row.pasto);
        if (!meal) {
            meal = { 
                name: row.pasto, 
                icon: getIcon(row.pasto), 
                time: "—", 
                items: [] 
            };
            daysMap[dateStr].meals.push(meal);
        }
        
        meal.items.push({
            id: row.id,
            food: row.alimento,
            qty: row.peso || "",
            unit: "g",
            kcal: parseInt(row.calorie) || 0,
            fatto: row.fatto === true || row.fatto === "true"
        });
    });
    return Object.values(daysMap);
}

function getIcon(pasto) {
    const p = pasto.toLowerCase();
    if (p.includes("colazione")) return "☕";
    if (p.includes("spuntino")) return "🧀";
    if (p.includes("pranzo")) return "🍽️";
    if (p.includes("cena")) return "🌙";
    return "🍱";
}

// --- RENDERING ---
function renderizzaInterfaccia() {
    const tabs = document.getElementById('tabs');
    const main = document.getElementById('mainContent');
    tabs.innerHTML = "";
    main.innerHTML = "";

    DAYS.forEach((day, di) => {
        // Tab
        const tab = document.createElement('div');
        tab.className = `tab ${di === 0 ? 'active' : ''}`;
        tab.onclick = () => show(di);
        const parts = day.label.split(" ");
        tab.innerHTML = `<span class="dn">${parts[0]}</span><span class="dl">${parts[1]}</span><span class="dot"></span>`;
        tabs.appendChild(tab);

        // Pannello
        const panel = document.createElement('div');
        panel.className = `panel ${di === 0 ? 'active' : ''}`;
        panel.id = `p${di}`;
        
        let html = `<div class="day-totals">
            <div class="dtbox"><span class="num">${day.total}</span><span class="lbl">Kcal tot</span></div>
            <div class="dtbox"><span class="num">~150g</span><span class="lbl">Proteine</span></div>
            <div class="dtbox"><span class="num">~80g</span><span class="lbl">Carb</span></div>
            <div class="dtbox"><span class="num">~60g</span><span class="lbl">Grassi</span></div>
        </div>`;

        day.meals.forEach((meal, mi) => {
            const mealId = `d${di}m${mi}`;
            const totalMealKcal = meal.items.reduce((s, i) => s + i.kcal, 0);
            
            html += `<div class="meal" id="${mealId}">
                <div class="mh">
                    <div class="mico">${meal.icon}</div>
                    <div class="minfo"><div class="mn">${meal.name}</div><div class="mt">⏰ ${meal.time}</div></div>
                    <div class="mkcal-badge">${totalMealKcal} kcal</div>
                </div>
                <div class="mb">`;

            meal.items.forEach((item, ii) => {
                const itemId = `${mealId}i${ii}`;
                const doneClass = item.fatto ? 'item-eaten' : '';
                const checkText = item.fatto ? '✓' : '○';
                const checkClass = item.fatto ? 'checked' : '';

                html += `<div class="item-row ${doneClass}" id="${itemId}">
                    <button class="item-check-btn ${checkClass}" onclick="toggleItem('${itemId}', ${di}, ${mi}, ${ii})">${checkText}</button>
                    <div class="item-main">
                        <span class="food">${item.qty}g ${item.food}</span>
                    </div>
                    <div class="item-kcal">${item.kcal} kcal</div>
                </div>`;
            });
            html += `</div></div>`;
        });
        panel.innerHTML = html;
        main.appendChild(panel);
    });
    updateKcal(0);
}

// --- LOGICA AZIONI ---
async function toggleItem(itemId, di, mi, ii) {
    const item = DAYS[di].meals[mi].items[ii];
    item.fatto = !item.fatto;

    // Aggiorna UI locale
    const row = document.getElementById(itemId);
    const btn = row.querySelector('.item-check-btn');
    if (item.fatto) {
        row.classList.add('item-eaten');
        btn.classList.add('checked');
        btn.textContent = "✓";
    } else {
        row.classList.remove('item-eaten');
        btn.classList.remove('checked');
        btn.textContent = "○";
    }

    updateKcal(di);

    // Invia al foglio Google
    try {
        await fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                pastoNome: DAYS[di].meals[mi].name,
                alimento: item.food,
                calorie: item.kcal,
                stato: item.fatto
            })
        });
    } catch (e) {
        console.error("Errore invio dati:", e);
    }
}

function updateKcal(dayIndex) {
    const day = DAYS[dayIndex];
    let eaten = 0;
    day.meals.forEach(m => {
        m.items.forEach(i => {
            if (i.fatto) eaten += i.kcal;
        });
    });

    const rem = Math.max(0, day.total - eaten);
    const pct = Math.min(100, (eaten / day.total) * 100);

    document.getElementById('kcalNum').textContent = rem;
    document.getElementById('kcalSub').textContent = `${eaten} / ${day.total}`;
    document.getElementById('progressBar').style.width = pct + '%';
}

function show(i) {
    document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', i === j));
    document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', i === j));
    currentDay = i;
    updateKcal(i);
}

// Avvio
window.onload = inizializzaApp;

</script>
</body>
</html>
