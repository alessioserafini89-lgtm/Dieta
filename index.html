<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alessio Diet v25 - Fix IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a18; --surface: #222220; --card: #2a2a26; --border: #383832; --green: #7ab648; --green-dim: #1e2d12; --amber: #e8962a; --text: #f0ede6; --muted: #888878; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; padding-bottom: 80px; }
        header { background: linear-gradient(155deg, #1c2e10 0%, #0d1808 100%); padding: 15px 20px; border-bottom: 1px solid #304018; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .tab-wrap { background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 72px; z-index: 90; }
        .tabs { display: flex; padding: 0 5px; }
        .tab { padding: 15px 18px; color: var(--muted); cursor: pointer; white-space: nowrap; font-size: 14px; }
        .tab.active { color: var(--green); border-bottom: 2px solid var(--green); font-weight: 600; }
        .main { padding: 15px; max-width: 600px; margin: 0 auto; }
        .meal-group { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; overflow: hidden; }
        .meal-group.is-complete { border: 2px solid var(--green); }
        .group-header { background: rgba(255,255,255,0.03); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .btn-fatto-all { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .ingredient-row { display: flex; flex-direction: column; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ing-top { display: flex; align-items: center; gap: 10px; width: 100%; }
        .ing-bottom { display: flex; padding-left: 34px; gap: 10px; margin-top: 5px; }
        .is-sub { background: rgba(0,0,0,0.1); border-left: 3px solid var(--border); }
        .is-parent { background: rgba(122, 182, 72, 0.05); }
        .ingredient-row.done { opacity: 0.4; }
        .check-mini { width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; color: transparent; }
        .check-mini.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }
        .weight-input { background: #1a1a18; border: 1px solid var(--border); color: var(--amber); width: 55px; padding: 4px; border-radius: 6px; text-align: center; font-size: 13px; font-weight: bold; -webkit-appearance: none; }
        .macro-tag { font-size: 10px; color: var(--muted); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; }
        .macro-tag b { color: var(--text); }
        .sub-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; margin-top: 5px; width: fit-content; }
        .ai-fab { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #000; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: none; z-index: 200; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 400; display: none; flex-direction: column; justify-content: flex-end; }
        .popup { background: var(--surface); border-top: 3px solid var(--green); border-radius: 24px 24px 0 0; padding: 24px; max-height: 80vh; overflow-y: auto; }
        .option-card { background: var(--card); border: 1px solid var(--border); padding: 16px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; }
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { border: 4px solid var(--surface); border-top: 4px solid var(--green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="loader"><div class="spinner"></div></div>
<header>
    <h1 style="font-family:'Playfair Display'">Piano <em>Alessio</em></h1>
    <div style="text-align:center;"><span id="remKcal" style="font-size: 1.4rem; color: var(--green); display: block; font-family:'Playfair Display'">2000</span><span style="font-size: 8px; color: var(--muted);">KCAL RIMASTE</span></div>
</header>
<div class="tab-wrap"><div class="tabs" id="tabs"></div></div>
<div class="main" id="app"></div>

<div id="subOverlay" class="overlay" onclick="this.style.display='none'">
    <div class="popup" onclick="event.stopPropagation()">
        <h3 style="margin-bottom:15px; font-family:'Playfair Display'">Sostituisci Alimento</h3>
        <div id="optionsContainer"></div>
    </div>
</div>

<button class="ai-fab" onclick="setApiKey()">🤖</button>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxGCutJ2CvacQTxCH0ZRH3d4pftYQF-XU_2fnT-527RuLVbvv9FjSUaXQGOfMv_AQyCqA/exec";
let allData = [];
let selectedDate = "";
let currentSubId = null;

function setApiKey() {
    const key = prompt("Configura Chiave API (sk-ant...):", localStorage.getItem('ale_api_key') || "");
    if (key) { localStorage.setItem('ale_api_key', key); alert("Chiave Salvata!"); }
}

async function loadData() {
    try {
        const response = await fetch(SCRIPT_URL);
        allData = await response.json();
        const uniqueDates = [...new Set(allData.map(item => item.Data))];
        if (!selectedDate) selectedDate = uniqueDates[0];
        renderTabs(uniqueDates); renderApp();
        document.getElementById('loader').style.display = 'none';
    } catch (e) { document.getElementById('loader').innerHTML = "Errore!"; }
}

function renderTabs(dates) {
    const container = document.getElementById('tabs'); container.innerHTML = "";
    dates.forEach(d => {
        const tab = document.createElement('div');
        tab.className = `tab ${d === selectedDate ? 'active' : ''}`;
        tab.innerText = d; tab.onclick = () => { selectedDate = d; renderTabs(dates); renderApp(); };
        container.appendChild(tab);
    });
}

function renderApp() {
    const container = document.getElementById('app'); container.innerHTML = "";
    const dietaGiorno = allData.filter(r => r.Data === selectedDate);
    const groups = dietaGiorno.reduce((acc, item) => {
        const key = item['Pasto'] || item['Tipologia Pasto'] || 'Altro';
        if (!acc[key]) acc[key] = [];
        acc[key].push(item); return acc;
    }, {});

    let kcalConsumate = 0;
    for (const [mealName, items] of Object.entries(groups)) {
        const isAllDone = items.every(i => String(i.Fatto).toUpperCase() === "TRUE");
        const groupEl = document.createElement('div');
        groupEl.className = `meal-group ${isAllDone ? 'is-complete' : ''}`;
        
        let html = `<div class="group-header"><span style="color:var(--amber); font-family:'Playfair Display'; font-size:1.1rem">${mealName}</span><button class="btn-fatto-all" onclick="toggleGroup('${mealName}', ${isAllDone})">${isAllDone ? 'Disfai' : 'Fatto'}</button></div>`;
        
        items.forEach(item => {
            const isSub = String(item.Alimento).startsWith('->') || String(item.ID).includes('.');
            const isDone = String(item.Fatto).toUpperCase() === "TRUE";
            const kcal = Math.round(parseFloat(item.Calorie) || 0);
            const p = item['Prot'] || 0, c = item['Carb'] || 0, g = item['Grassi'] || 0;
            if(isDone) kcalConsumate += kcal;

            html += `<div class="ingredient-row ${isSub ? 'is-sub' : 'is-parent'} ${isDone ? 'done' : ''}">
                <div class="ing-top">
                    <div class="check-mini ${isDone ? 'active' : ''}" onclick="toggleIngredient('${item.ID}', ${isDone})">✓</div>
                    <div style="flex:1;">
                        <div style="font-size:14px; color: ${isSub ? 'var(--text)' : 'var(--amber)'}">${item.Alimento}</div>
                        ${!isSub ? `<div style="font-size:10px; color:var(--green)">Totale: ${kcal} kcal | P: ${p}g C: ${c}g G: ${g}g</div>` : ''}
                        ${isSub ? `<button class="sub-btn" onclick="openSubPopup('${item.ID}', '${item.Alimento}', ${kcal})">Sostituisci</button>` : ''}
                    </div>
                    ${isSub ? `<input type="number" class="weight-input" value="${item['Peso gr']}" onchange="updateWeight('${item.ID}', this.value, ${item['Peso gr']}, ${item.Calorie})">` : ''}
                    <div style="font-size:12px; font-weight:700; width:55px; text-align:right">${isSub ? kcal : ''}</div>
                </div>
                ${isSub ? `<div class="ing-bottom"><span class="macro-tag">P: <b>${p}g</b></span><span class="macro-tag">C: <b>${c}g</b></span><span class="macro-tag">G: <b>${g}g</b></span></div>` : ''}
            </div>`;
        });
        groupEl.innerHTML = html; container.appendChild(groupEl);
    }
    document.getElementById('remKcal').textContent = 2000 - kcalConsumate;
}

async function openSubPopup(id, food, kcal) {
    const key = localStorage.getItem('ale_api_key');
    if(!key) return alert("Clicca sul Robot 🤖!");
    currentSubId = id;
    document.getElementById('subOverlay').style.display = 'flex';
    document.getElementById('optionsContainer').innerHTML = "Caricamento...";
    
    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ 
                action: 'proxyClaude', 
                prompt: "Sei un nutrizionista Keto. Utente mangia: " + food + " (" + kcal + " kcal). Proponi 4 alternative Keto. Rispondi SOLO array JSON: [{\"alimento\": \"nome\", \"calorie\": numero}]", 
                key: key 
            })
        });
        const fullText = await response.text();
        const data = JSON.parse(fullText);
        const text = data.content[0].text;
        const opts = JSON.parse(text.match(/\[.*\]/s)[0]);
        let html = "";
        opts.forEach(o => {
            html += `<div class="option-card" onclick="applySub('${o.alimento.replace(/'/g, "\\'")}', ${o.calorie})">
                <div style="font-weight:600; font-size:14px">${o.alimento}</div>
                <div style="color:var(--amber); font-size:12px">${o.calorie} kcal</div>
            </div>`;
        });
        document.getElementById('optionsContainer').innerHTML = html;
    } catch (e) { document.getElementById('optionsContainer').innerHTML = "Errore IA. Verifica chiave."; }
}

async function applySub(f, k) {
    const item = allData.find(i => i.ID == currentSubId);
    item.Alimento = "-> " + f; item.Calorie = k;
    renderApp();
    document.getElementById('subOverlay').style.display = 'none';
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'replace', id: currentSubId.toString(), newFood: "-> " + f, newCalories: k }) });
}

async function updateWeight(id, newWeight, oldWeight, oldKcal) {
    const newKcal = Math.round((oldKcal / oldWeight) * newWeight);
    const item = allData.find(i => i.ID == id);
    item['Peso gr'] = newWeight; item.Calorie = newKcal;
    renderApp();
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'updateWeight', id: id, newWeight: newWeight, newKcal: newKcal }) });
}

async function toggleIngredient(id, currentStatus) {
    const newStatus = !currentStatus;
    allData.find(i => i.ID == id).Fatto = newStatus ? "TRUE" : "FALSE";
    renderApp();
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'toggleDone', id: id, value: newStatus ? "TRUE" : "FALSE" }) });
}

async function toggleGroup(mealName, currentlyAllDone) {
    const newStatus = currentlyAllDone ? "FALSE" : "TRUE";
    allData.forEach(item => {
        const name = item['Pasto'] || item['Tipologia Pasto'];
        if (item.Data === selectedDate && name === mealName) {
            item.Fatto = newStatus;
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'toggleDone', id: item.ID, value: newStatus }) });
        }
    });
    renderApp();
}
window.onload = loadData;
</script>
</body>
</html>
