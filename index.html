<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA IA BLINDATO</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .btn { background: #32d74b; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; color: #000; margin-bottom: 10px; }
        #debug { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; text-align: left; font-family: monospace; font-size: 12px; margin-top: 20px; white-space: pre-wrap; color: #aaa; }
    </style>
</head>
<body>

    <h2>Controllo Canale IA</h2>
    <button class="btn" style="background:#8e8e93" onclick="setKey()">1. IMPOSTA CHIAVE</button>
    <button class="btn" onclick="runTest()">2. TESTA CONNESSIONE</button>

    <div id="status" style="margin-top:20px; font-weight:bold;">Stato: In attesa</div>
    <div id="debug">I dettagli del server appariranno qui...</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnT4DvqVj04f1YVbjBvR5w4m_XQ28eYeOZt-5aUPix90EN6dxM8a7cPKh4C8TOQK3DrA/exec";

function setKey() {
    const k = prompt("Incolla chiave sk-ant...:");
    if(k) localStorage.setItem('claude_key', k);
}

async function runTest() {
    const key = localStorage.getItem('claude_key');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');
    
    if(!key) return alert("Manca la chiave!");

    status.innerText = "Chiamata a Google in corso...";
    status.style.color = "#ff9f0a";
    debug.innerText = "Avvio fetch...";

    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'proxyClaude',
                key: key,
                prompt: 'Rispondi solo con la parola "FUNZIONA"'
            })
        });

        const rawData = await response.text();
        debug.innerText = "RISPOSTA GREZZA DAL SERVER:\n" + rawData;

        const data = JSON.parse(rawData);
        
        if (data.content && data.content[0]) {
            status.innerText = "SUCCESSO! L'IA RISPONDE.";
            status.style.color = "#32d74b";
        } else if (data.error) {
            status.innerText = "ERRORE DAL SERVER GOOGLE";
            status.style.color = "#ff453a";
        } else {
            status.innerText = "ERRORE NELLA RISPOSTA IA";
            status.style.color = "#ff453a";
        }

    } catch (e) {
        status.innerText = "ERRORE DI RETE / CORS";
        status.style.color = "#ff453a";
        debug.innerText = e.toString();
    }
}
</script>
</body>
</html>
