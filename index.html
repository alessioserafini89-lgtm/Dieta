<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Piano Alessio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a18; --surface: #222220; --card: #2a2a26; --border: #383832;
            --green: #7ab648; --green-dim: #1e2d12; --amber: #e8962a; --amber-dim: #332310;
            --text: #f0ede6; --muted: #888878; --done-bg: #141f0c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; padding-bottom: 50px; }
        header { background: linear-gradient(155deg, #1c2e10 0%, #0d1808 100%); padding: 20px 16px; border-bottom: 1px solid #304018; position: sticky; top: 0; z-index: 100; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
        h1 em { color: var(--green); font-style: italic; }
        
        .main { padding: 15px; max-width: 600px; margin: 0 auto; }
        .meal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; transition: all 0.3s; }
        .meal-card.done { background: var(--done-bg); border-color: var(--green-dim); opacity: 0.8; }
        
        .meal-header { display: flex; align-items: center; padding: 12px; gap: 12px; border-bottom: 1px solid var(--border); }
        .meal-name { flex: 1; font-weight: 600; font-size: 14px; }
        .meal-kcal { color: var(--amber); font-weight: 700; font-size: 13px; }
        
        .check-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: none; color: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .check-btn.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }

        .food-detail { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .food-text { font-size: 13px; color: var(--text); }
        
        .sub-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .sub-btn:active { background: var(--amber-dim); color: var(--amber); }

        .loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { border: 4px solid var(--surface); border-top: 4px solid var(--green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-size:12px; color:var(--muted)">Sincronizzazione Dieta...</p>
</div>

<header>
    <div class="eyebrow" style="font-size:10px; color:var(--green); letter-spacing:2px; margin-bottom:5px">PIANO DINAMICO</div>
    <h1>Ciao <em>Alessio</em> 👋</h1>
    <div id="stats" style="font-size:12px; color:var(--muted); margin-top:5px">Caricamento calorie...</div>
</header>

<div class="main" id="app">
    </div>

<script>
// --- CONFIGURAZIONE (Sostituisci con i tuoi dati) ---
const SCRIPT_URL = "INCOLLA_QUI_URL_DELLA_TUA_WEB_APP_GOOGLE";
const CLAUDE_API_KEY = localStorage.getItem('ale_api_key') || "";

let dietaOggi = [];

// 1. CARICA DATI DAL FOGLIO GOOGLE
async function loadData() {
    try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        
        // Filtra solo per la data di oggi (formato nel foglio: DD/MM/YYYY o simile)
        const oggi = new Date().toLocaleDateString('it-IT');
        dietaOggi = data.filter(r => new Date(r.Data).toLocaleDateString('it-IT') === oggi);
        
        renderApp();
        document.getElementById('loader').style.display = 'none';
    } catch (e) {
        alert("Errore caricamento: " + e.message);
    }
}

// 2. DISEGNA L'INTERFACCIA
function renderApp() {
    const container = document.getElementById('app');
    container.innerHTML = "";
    let kcalTot = 0;
    let kcalRimanenti = 0;

    dietaOggi.forEach(item => {
        kcalTot += parseInt(item.Calorie);
        if (!item.Fatto || item.Fatto == "FALSE") kcalRimanenti += parseInt(item.Calorie);

        const card = document.createElement('div');
        card.className = `meal-card ${item.Fatto == "TRUE" ? 'done' : ''}`;
        card.innerHTML = `
            <div class="meal-header">
                <button class="check-btn ${item.Fatto == "TRUE" ? 'active' : ''}" onclick="toggleDone(${item.ID}, ${item.Fatto == "TRUE"})">✓</button>
                <div class="meal-name">${item.Pasto}</div>
                <div class="meal-kcal">${item.Calorie} kcal</div>
            </div>
            <div class="food-detail">
                <div class="food-text">${item.Alimento}</div>
                <button class="sub-btn" onclick="askSubstitution(${item.ID}, '${item.Alimento}', ${item.Calorie})">↺ Sostituisci</button>
            </div>
        `;
        container.appendChild(card);
    });

    document.getElementById('stats').textContent = `🔥 ${kcalRimanenti} kcal rimanenti su ${kcalTot}`;
}

// 3. SEGNA COME FATTO (Scrive nel foglio)
async function toggleDone(id, currentStatus) {
    const newStatus = !currentStatus;
    await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ action: 'toggleDone', id: id, value: newStatus.toString().toUpperCase() })
    });
    loadData(); // Ricarica per confermare
}

// 4. SOSTITUZIONE CON IA (Claude)
async function askSubstitution(id, food, kcal) {
    if (!CLAUDE_API_KEY) { alert("Imposta la chiave API!"); return; }
    
    const btn = event.target;
    btn.textContent = "⌛...";
    
    try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': CLAUDE_API_KEY,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
                model: "claude-3-haiku-20240307",
                max_tokens: 100,
                messages: [{role: "user", content: `Sostituisci "${food}" (${kcal} kcal) con un'alternativa per una dieta low-carb alta proteina. Rispondi SOLO con un oggetto JSON: {"alimento": "nuovo nome", "calorie": numero}`}]
            })
        });

        const data = await response.json();
        const result = JSON.parse(data.content[0].text);

        // Invia la sostituzione al Foglio Google
        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ 
                action: 'replace', 
                id: id, 
                newFood: result.alimento, 
                newCalories: result.calorie 
            })
        });

        alert(`Sostituito con: ${result.alimento}`);
        loadData();
    } catch (e) {
        alert("Errore IA: " + e.message);
        btn.textContent = "↺ Sostituisci";
    }
}

// Avvio
window.onload = loadData;
</script>

</body>
</html>
