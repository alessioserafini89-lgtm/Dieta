<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST DEFINITIVO 1.1</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 30px; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; }
        button { background: #32d74b; color: #000; font-weight: bold; }
        #log { background: #111; border: 1px solid #333; padding: 15px; text-align: left; font-family: monospace; font-size: 11px; color: #0f0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h3>Test Gemini Flash Latest</h3>
    <input type="text" id="apiKey" placeholder="Chiave AIza...">
    <button onclick="testAI()">AVVIA TEST</button>
    <div id="status" style="margin:20px; font-weight:bold;">In attesa...</div>
    <div id="log">Log tecnico...</div>

    <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7cFdHruJ57qWlnKSe_pz7NunRlfbx8aPQ_Okk6aH5Ak2g1Ra0XUDMsJyaoaqNcIzvTQ/exec";

    async function testAI() {
        const key = document.getElementById('apiKey').value;
        const status = document.getElementById('status');
        const log = document.getElementById('log');

        status.innerText = "Chiamata in corso...";
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'proxyAI', key: key, prompt: 'Rispondi solo con: FUNZIONA' })
            });
            const data = await response.json();
            log.innerText = JSON.stringify(data, null, 2);

            if (data.candidates) {
                status.innerText = "SUCCESSO! L'IA HA RISPOSTO.";
                status.style.color = "#32d74b";
            } else {
                status.innerText = "ERRORE: Modello non trovato o Chiave errata.";
                status.style.color = "red";
            }
        } catch (e) {
            status.innerText = "ERRORE DI RETE";
            log.innerText = e.toString();
        }
    }
    </script>
</body>
</html>
